name: Deploy Vitα (GitHub Pages)

on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Pages (ativa se necessário)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Empacotar site (docs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
