<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultor Nutricional</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#1B5E42;--pm:#2D6A4F;--s:#40916C;--acc:#F4A261;
  --bg:#EEF5F1;--sur:#fff;--bdr:#C8DDD4;
  --tx:#17201B;--mu:#6B7A72;
  --sh:0 2px 8px rgba(0,0,0,.08);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx)}
#root{min-height:100dvh;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:var(--p);color:#fff;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.hdr-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px}
.hdr-icon{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.btn-sm{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 13px;border-radius:18px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-sm:hover{background:rgba(255,255,255,.25)}

/* PROGRESS */
.prog-wrap{background:var(--p);padding:0 18px 12px}
.steps{display:flex;align-items:center;gap:0;justify-content:center;margin-bottom:10px}
.sdot{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.35);color:rgba(255,255,255,.5);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sdot.active{border-color:#fff;color:#fff;background:rgba(255,255,255,.2)}
.sdot.done{border-color:var(--acc);background:var(--acc);color:#fff}
.sline{flex:1;height:2px;background:rgba(255,255,255,.2);max-width:48px}
.prog-bar{height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .3s}

/* MAIN */
.main{flex:1;padding:20px 14px 40px;max-width:620px;margin:0 auto;width:100%}

/* CARD */
.card{background:var(--sur);border-radius:18px;padding:24px;box-shadow:var(--sh);margin-bottom:16px}
.step-title{font-size:20px;font-weight:700;margin-bottom:6px;color:var(--p)}
.step-sub{font-size:13px;color:var(--mu);margin-bottom:20px;line-height:1.5}

/* OPTION GRID (goals) */
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.opt-card{background:var(--bg);border:2px solid var(--bdr);border-radius:14px;padding:14px 12px;text-align:left;cursor:pointer;transition:all .18s;font-family:inherit;display:flex;flex-direction:column;gap:3px}
.opt-card:hover{border-color:var(--s);box-shadow:var(--sh)}
.opt-card.sel{border-color:var(--s);background:#E8F5EE}
.opt-icon{font-size:24px}
.opt-label{font-size:13px;font-weight:700;color:var(--tx)}
.opt-desc{font-size:11px;color:var(--mu)}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;font-weight:600;color:var(--tx)}
.inp-wrap{position:relative;display:flex;align-items:center}
.inp-wrap input{width:100%;padding:10px 40px 10px 14px;border:1.5px solid var(--bdr);border-radius:10px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--tx);outline:none;transition:border .2s}
.inp-wrap input:focus{border-color:var(--s);background:#fff}
.inp-wrap .unit{position:absolute;right:12px;font-size:12px;color:var(--mu);pointer-events:none}
.sex-row{display:flex;gap:8px}
.sex-btn{flex:1;padding:10px;border:1.5px solid var(--bdr);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;background:var(--bg);color:var(--mu);font-family:inherit;transition:all .18s}
.sex-btn.sel{border-color:var(--s);background:#E8F5EE;color:var(--p)}
.act-list{display:flex;flex-direction:column;gap:7px}
.act-item{border:1.5px solid var(--bdr);border-radius:10px;padding:10px 14px;cursor:pointer;text-align:left;font-family:inherit;background:var(--bg);transition:all .18s;display:flex;justify-content:space-between;align-items:center}
.act-item:hover{border-color:var(--s)}
.act-item.sel{border-color:var(--s);background:#E8F5EE}
.act-label{font-size:13px;font-weight:600;color:var(--tx)}
.act-desc{font-size:11px;color:var(--mu)}
.field-full{margin-bottom:14px}

/* CONDITIONS */
.cond-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.cond-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:10px;cursor:pointer;background:var(--bg);transition:all .18s}
.cond-item.checked{border-color:var(--s);background:#E8F5EE}
.cond-item input{width:16px;height:16px;margin-top:1px;accent-color:var(--s);flex-shrink:0;cursor:pointer}
.cond-item span{font-size:13px;color:var(--tx);line-height:1.4}
.cond-none{border-style:dashed}
.divider{height:1px;background:var(--bdr);margin:8px 0}
.text-inp{width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;outline:none;margin-top:6px}
.text-inp:focus{border-color:var(--s)}

/* PREFERENCES */
.diet-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.diet-card{border:1.5px solid var(--bdr);border-radius:12px;padding:12px 8px;cursor:pointer;font-family:inherit;background:var(--bg);text-align:center;display:flex;flex-direction:column;gap:3px;transition:all .18s}
.diet-card:hover{border-color:var(--s)}
.diet-card.sel{border-color:var(--s);background:#E8F5EE}
.diet-icon{font-size:22px}
.diet-label{font-size:13px;font-weight:700}
.diet-desc{font-size:11px;color:var(--mu)}
.prot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.prot-card{border:1.5px solid var(--bdr);border-radius:12px;padding:10px 6px;cursor:pointer;font-family:inherit;background:var(--bg);text-align:center;display:flex;flex-direction:column;gap:4px;transition:all .18s}
.prot-card:hover{border-color:var(--s)}
.prot-card.sel{border-color:var(--s);background:#E8F5EE}
.prot-icon{font-size:20px}
.prot-label{font-size:11px;font-weight:600;color:var(--tx);line-height:1.25}
.intol-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.intol-chip{display:flex;align-items:center;gap:6px;padding:7px 12px;border:1.5px solid var(--bdr);border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;background:var(--bg);transition:all .18s}
.intol-chip.sel{border-color:var(--s);background:#E8F5EE;color:var(--p)}
.intol-chip input{width:13px;height:13px;accent-color:var(--s);cursor:pointer}
.pref-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.radio-list{display:flex;flex-direction:column;gap:7px}
.radio-item{border:1.5px solid var(--bdr);border-radius:10px;padding:9px 12px;cursor:pointer;font-family:inherit;background:var(--bg);text-align:left;transition:all .18s}
.radio-item:hover{border-color:var(--s)}
.radio-item.sel{border-color:var(--s);background:#E8F5EE}
.radio-item span{display:block;font-size:13px;font-weight:600;color:var(--tx)}
.radio-item small{font-size:11px;color:var(--mu)}

/* NAV */
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:20px;gap:10px}
.btn-primary{background:var(--p);color:#fff;border:none;padding:11px 22px;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s}
.btn-primary:hover:not(:disabled){background:var(--pm);transform:translateY(-1px)}
.btn-primary:disabled{background:var(--bdr);cursor:not-allowed}
.btn-back{background:transparent;border:1.5px solid var(--bdr);color:var(--mu);padding:10px 18px;border-radius:24px;font-size:14px;cursor:pointer;font-family:inherit;transition:all .18s}
.btn-back:hover{border-color:var(--s);color:var(--p)}
.err-msg{color:#DC2626;font-size:12px;margin-top:6px}

/* RESULTS */
.res-main{padding:16px 14px 40px}
.res-header{background:var(--p);color:#fff;padding:20px;border-radius:16px;margin-bottom:14px;display:flex;gap:14px;align-items:flex-start}
.res-hicon{font-size:32px}
.res-header h2{font-size:18px;font-weight:700;margin-bottom:4px}
.res-header p{font-size:12px;opacity:.8;line-height:1.5}
.disc{background:#FFF8E7;border:1px solid #F4A261;border-radius:12px;padding:12px 14px;font-size:13px;color:#7C4700;margin-bottom:14px;line-height:1.5}

.sec{background:var(--sur);border-radius:16px;padding:18px;box-shadow:var(--sh);margin-bottom:14px}
.sec-title{font-size:15px;font-weight:700;color:var(--p);margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Calories */
.cal-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--bg);font-size:13px;gap:8px}
.cal-row:last-child{border-bottom:none}
.cal-row span{color:var(--mu);flex:1}
.cal-row strong{font-size:14px;white-space:nowrap}
.cal-row.hl{background:var(--bg);border-radius:8px;padding:10px;margin-top:4px;border-bottom:none}
.cal-row.hl strong{font-size:18px;color:var(--p)}

/* Macros */
.macro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.mc{border-radius:12px;padding:14px 10px;text-align:center}
.mc.prot{background:#E8F5EE;border:1px solid #A7D9BA}
.mc.carb{background:#FFF4ED;border:1px solid #F4C89A}
.mc.fat {background:#EEF2FF;border:1px solid #C7D2FE}
.mc-val{font-size:22px;font-weight:800;color:var(--p)}
.mc.carb .mc-val{color:#C2410C}
.mc.fat  .mc-val{color:#3730A3}
.mc-lbl{font-size:12px;font-weight:700;margin:2px 0;color:var(--tx)}
.mc-sub{font-size:11px;color:var(--mu)}
.mbar{height:10px;border-radius:5px;overflow:hidden;display:flex;gap:2px;margin-top:4px}
.mbar-p{background:#40916C}
.mbar-c{background:#F4A261}
.mbar-f{background:#818CF8}
.mbar-legend{display:flex;gap:14px;margin-top:6px;font-size:11px;color:var(--mu)}
.mbar-legend span{display:flex;align-items:center;gap:4px}
.mbar-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* Meals */
.meal-item{margin-bottom:14px}
.meal-title{font-size:13px;font-weight:700;color:var(--pm);margin-bottom:6px}
.meal-item ul{padding-left:18px}
.meal-item li{font-size:13px;color:var(--tx);margin-bottom:3px;line-height:1.4}
.subs-box{background:var(--bg);border-radius:10px;padding:12px;margin-top:10px;font-size:12px}
.subs-box strong{display:block;margin-bottom:5px;color:var(--mu)}
.subs-box li{margin-bottom:3px;color:var(--mu)}

/* Tips */
.tip{border-radius:10px;padding:11px 13px;font-size:12px;line-height:1.5;margin-top:8px}
.tip.warn{background:#FEF9C3;border:1px solid #FDE047;color:#713F12}
.tip.info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
.tip.eco {background:#F0FDF4;border:1px solid #86EFAC;color:#14532D}
.tip.alert{background:#FEF2F2;border:1px solid #FCA5A5;color:#7F1D1D}

/* Shopping */
.shop-cat{font-size:12px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;margin-top:10px}
.shop-cat:first-child{margin-top:0}
.shop-list{display:flex;flex-wrap:wrap;gap:6px}
.shop-tag{background:var(--bg);border:1px solid var(--bdr);border-radius:20px;padding:4px 11px;font-size:12px;color:var(--tx)}

/* STOP PAGE */
.stop-card{text-align:center}
.stop-icon{font-size:52px;margin-bottom:12px}
.stop-card h2{font-size:20px;font-weight:700;color:var(--p);margin-bottom:8px}
.stop-card p{font-size:14px;color:var(--mu);margin-bottom:10px;line-height:1.5}
.stop-why{background:var(--bg);border-radius:12px;padding:14px;text-align:left;font-size:13px;margin:14px 0}
.stop-why strong{display:block;margin-bottom:8px;color:var(--tx)}
.stop-why li{margin-bottom:6px;color:var(--mu);line-height:1.45;margin-left:16px}
.stop-where{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:12px;padding:14px;text-align:left;font-size:13px}
.stop-where strong{display:block;margin-bottom:8px;color:#1E40AF}
.stop-where li{margin-bottom:5px;color:#1E40AF;margin-left:16px}

/* Print */
.print-btn{background:var(--bg);border:1.5px solid var(--bdr);color:var(--mu);padding:9px 18px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit}
.print-btn:hover{border-color:var(--s);color:var(--p)}
.center-row{text-align:center;display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
@media(max-width:480px){
  .opt-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .pref-grid{grid-template-columns:1fr}
  .macro-grid{grid-template-columns:repeat(3,1fr)}
  .diet-row{grid-template-columns:repeat(3,1fr)}
  .prot-grid{grid-template-columns:repeat(2,1fr)}
}
@media print{.hdr,.prog-wrap,.nav-row,.center-row{display:none}.sec{box-shadow:none;border:1px solid #ddd}}
</style>
</head>
<body>
<div id="root"></div>
<script>
/* ── STATE ── */
const S = {
  step:1,
  goal:null,
  age:'', weight:'', height:'', sex:null, activity:null,
  conditions:[], meds:'', allergies:'',
  diet:null, intolerances:[], budget:null, time:null,
  proteins:[],
};

/* ── SAVE TEXT FIELDS before re-render ── */
function saveFields() {
  ['f-age','f-weight','f-height','f-meds'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (id==='f-age')    S.age    = el.value;
    if (id==='f-weight') S.weight = el.value;
    if (id==='f-height') S.height = el.value;
    if (id==='f-meds')   S.meds   = el.value;
  });
}

function render() {
  saveFields();
  const el = document.getElementById('root');
  el.innerHTML = page();
  window.scrollTo(0,0);
}

/* ── PAGE DISPATCH ── */
function page() {
  if (S.step === 'stop')    return hdr(false) + buildStop();
  if (S.step === 'results') return hdr(false) + buildResults();
  return hdr(true) + body();
}

function hdr(withSteps) {
  if (!withSteps) return `
    <header class="hdr">
      <div class="hdr-brand"><div class="hdr-icon">🥗</div>Consultor Nutricional</div>
      <button class="btn-sm" onclick="restart()">↩ Recomeçar</button>
    </header>`;
  const labels=['Objetivo','Perfil','Saúde','Preferências'];
  const dots = labels.map((l,i)=>{
    const cls = i+1<S.step?'done':i+1===S.step?'active':'';
    const inner = i+1<S.step?'✓':(i+1);
    return `<div class="sdot ${cls}" title="${l}">${inner}</div>` +
           (i<3?'<div class="sline"></div>':'');
  }).join('');
  const pct = ((S.step-1)/4*100).toFixed(0);
  return `
    <header class="hdr">
      <div class="hdr-brand"><div class="hdr-icon">🥗</div>Consultor Nutricional</div>
    </header>
    <div class="prog-wrap">
      <div class="steps">${dots}</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;
}

function body() {
  switch(S.step) {
    case 1: return buildStep1();
    case 2: return buildStep2();
    case 3: return buildStep3();
    case 4: return buildStep4();
  }
}

/* ── STEP 1: GOAL ── */
const GOALS=[
  {k:'loss',        icon:'⚖️', label:'Perder peso',       desc:'Reduzir gordura corporal'},
  {k:'gain',        icon:'💪', label:'Ganhar massa',      desc:'Hipertrofia muscular'},
  {k:'maintain',    icon:'⚡', label:'Manter peso',       desc:'Equilíbrio calórico'},
  {k:'performance', icon:'🏃', label:'Performance',       desc:'Melhorar rendimento'},
  {k:'health',      icon:'🫀', label:'Saúde geral',       desc:'Qualidade de vida'},
];
function buildStep1() {
  const cards = GOALS.map(g=>`
    <button class="opt-card ${S.goal===g.k?'sel':''}" onclick="S.goal='${g.k}';render()">
      <span class="opt-icon">${g.icon}</span>
      <span class="opt-label">${g.label}</span>
      <span class="opt-desc">${g.desc}</span>
    </button>`).join('');
  return `<div class="main"><div class="card">
    <h2 class="step-title">Qual é seu objetivo?</h2>
    <p class="step-sub">Escolha o que melhor descreve o que você busca agora.</p>
    <div class="opt-grid">${cards}</div>
    <div class="nav-row">
      <span></span>
      <button class="btn-primary" onclick="if(S.goal){S.step=2;render()}else{document.getElementById('g-err').textContent='Selecione um objetivo.'}" ${!S.goal?'':''}">Continuar →</button>
    </div>
    <p id="g-err" class="err-msg"></p>
  </div></div>`;
}

/* ── STEP 2: PROFILE ── */
const ACTS=[
  {k:'sed',     label:'Sedentário',           desc:'Mesa, sem exercício'},
  {k:'light',   label:'Levemente ativo',      desc:'Exercício 1–3 dias/sem'},
  {k:'mod',     label:'Moderadamente ativo',  desc:'Exercício 3–5 dias/sem'},
  {k:'active',  label:'Muito ativo',          desc:'Exercício 6–7 dias/sem'},
  {k:'vactive', label:'Extremamente ativo',   desc:'Atleta / trabalho físico pesado'},
];
function buildStep2() {
  const acts = ACTS.map(a=>`
    <button class="act-item ${S.activity===a.k?'sel':''}" onclick="S.activity='${a.k}';render()">
      <span class="act-label">${a.label}</span>
      <span class="act-desc">${a.desc}</span>
    </button>`).join('');
  return `<div class="main"><div class="card">
    <h2 class="step-title">Seu perfil</h2>
    <p class="step-sub">Calcula seu metabolismo pela fórmula Mifflin-St Jeor.</p>
    <div class="form-row">
      <div class="field">
        <label>Idade</label>
        <div class="inp-wrap"><input id="f-age" type="number" min="10" max="100" value="${S.age}" placeholder="anos"></div>
      </div>
      <div class="field">
        <label>Sexo</label>
        <div class="sex-row">
          <button class="sex-btn ${S.sex==='M'?'sel':''}" onclick="S.sex='M';render()">♂ Masculino</button>
          <button class="sex-btn ${S.sex==='F'?'sel':''}" onclick="S.sex='F';render()">♀ Feminino</button>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Peso</label>
        <div class="inp-wrap"><input id="f-weight" type="number" min="30" max="300" value="${S.weight}" placeholder="kg"><span class="unit">kg</span></div>
      </div>
      <div class="field">
        <label>Altura</label>
        <div class="inp-wrap"><input id="f-height" type="number" min="100" max="250" value="${S.height}" placeholder="cm"><span class="unit">cm</span></div>
      </div>
    </div>
    <div class="field-full">
      <div class="field"><label>Nível de atividade</label><div class="act-list">${acts}</div></div>
    </div>
    <div class="nav-row">
      <button class="btn-back" onclick="S.step=1;render()">← Voltar</button>
      <button class="btn-primary" onclick="nextStep2()">Continuar →</button>
    </div>
    <p id="p-err" class="err-msg"></p>
  </div></div>`;
}
function nextStep2() {
  saveFields();
  const a=+S.age,w=+S.weight,h=+S.height;
  if (!a||!w||!h||!S.sex||!S.activity||a<10||a>100||w<30||w>300||h<100||h>250) {
    document.getElementById('p-err').textContent='Preencha todos os campos com valores válidos.';
    return;
  }
  S.step=3; render();
}

/* ── STEP 3: HEALTH ── */
const CONDS=[
  {k:'diabetes',        label:'Diabetes (tipo 1 ou 2)'},
  {k:'renal',           label:'Doença renal'},
  {k:'cardiac',         label:'Doença cardiovascular'},
  {k:'thyroid',         label:'Disfunção tireoidiana (hipo/hipertireoidismo)'},
  {k:'pregnancy',       label:'Gestação ou lactação'},
  {k:'eating_disorder', label:'Histórico de transtorno alimentar (anorexia, bulimia, compulsão)'},
  {k:'meds',            label:'Uso de medicamentos que afetam metabolismo ou peso'},
];
const STOP_KEYS=new Set(['diabetes','renal','cardiac','thyroid','pregnancy','eating_disorder','meds']);

function buildStep3() {
  const hasMeds = S.conditions.includes('meds');
  const isNone  = S.conditions.length===0;
  const items = CONDS.map(c=>`
    <label class="cond-item ${S.conditions.includes(c.k)?'checked':''}">
      <input type="checkbox" ${S.conditions.includes(c.k)?'checked':''} onchange="toggleCond('${c.k}',this.checked)">
      <span>${c.label}</span>
    </label>`).join('');
  return `<div class="main"><div class="card">

function toggleCond(k,v) {

function setDiet(k) {
  if (S.diet !== k) S.proteins = [];

  render();
}
function toggleProtein(k) {
  if (S.proteins.includes(k)) S.proteins = S.proteins.filter(x=>x!==k);
  else S.proteins.push(k);

}
function toggleIntol(k,v) {

/* ── CALCULATIONS ── */
const PAL   ={sed:1.2,light:1.375,mod:1.55,active:1.725,vactive:1.9};
const GFAC  ={loss:.80,gain:1.10,maintain:1.0,performance:1.05,health:1.0};
const PROT  ={loss:2.0,gain:1.8,maintain:1.6,performance:2.0,health:1.4};

function tmb(){
  const w=+S.weight,h=+S.height,a=+S.age;
  return S.sex==='M' ? 10*w+6.25*h-5*a+5 : 10*w+6.25*h-5*a-161;
}
function tdee(){ return tmb()*PAL[S.activity]; }
function goalCal(){
  const min = S.sex==='F'?1200:1500;
  return Math.max(Math.round(tdee()*GFAC[S.goal]), min);
}
function macros(){
  const kcal=goalCal(), w=+S.weight;
  const prot = Math.round(w*PROT[S.goal]);
  const pKcal= prot*4;
  const fKcal= Math.round(kcal*.27);
  const fat  = Math.round(fKcal/9);
  const cKcal= Math.max(0,kcal-pKcal-fKcal);
  const carbs= Math.round(cKcal/4);
  return {prot,fat,carbs,pKcal,fKcal,cKcal};
}

function buildMealPlan(){
  const opts = PROTEINS[S.diet].filter(p=>S.proteins.includes(p.k));
  const base = BASE_MEALS[S.diet];
  const pick = slot => opts.map(p=>p[slot]).filter(Boolean).join(' ou ');
  const bfP=pick('breakfast'), alP=pick('lunch'), snP=pick('snack'), jtP=pick('dinner');
  const bf=[...(bfP?[bfP]:[]),...base.bf];
  const al=[...(alP?[alP]:[]),...base.al];
  const sn=[...(snP?[snP]:[]),...base.sn];
  const jt=[...(jtP?[jtP]:[]),...base.jt];
  const unselected = PROTEINS[S.diet].filter(p=>!S.proteins.includes(p.k));
  const sb = unselected.length
    ? unselected.map(p=>`${p.label} — alternativa às proteínas escolhidas`)
    : ['Ajuste as porções de proteína conforme apetite e disponibilidade.'];
  const note = S.diet==='vegan'
    ? '⚠️ Vitamina B12: suplementação é necessária para veganos (evidência forte). Monitore também ferro, zinco, cálcio e ômega-3 (DHA/EPA). Faça exames a cada 6–12 meses.'
    : null;
  return {bf,al,sn,jt,sb,note};
}

function safetyAlert(){
  const kcal=goalCal();
  const minKcal = S.sex==='F'?1200:1500;
  const raw = Math.round(tdee()*GFAC[S.goal]);
  if (raw<minKcal) return `Meta calculada (${raw} kcal) ficou abaixo do mínimo seguro (${minKcal} kcal) — ajustada automaticamente. Considere consultar um nutricionista para avaliação individualizada.`;
  if (S.goal==='loss') return 'Déficit de 20% representa perda estimada de 0,5–0,8 kg/semana. Perdas maiores aumentam risco de perda muscular.';
  if (S.goal==='gain') return 'Superávit de 10% minimiza acúmulo de gordura. Se ganhar > 1 kg/mês, reduza ligeiramente as calorias.';
  if (S.diet==='vegan') return 'Dieta vegana: monitore vitamina B12 (suplementação obrigatória), ferro e zinco. Faça exames a cada 6–12 meses.';
  return 'Este plano é uma estimativa. Ajuste conforme sua resposta nas primeiras 2–4 semanas.';
}

    </div>

    <!-- ALERTA -->
    <div class="tip alert" style="margin-bottom:16px">⚠️ ${safetyAlert()}</div>

    <div class="center-row">
      <button class="btn-primary" onclick="restart()">↩ Nova consulta</button>
      <button class="print-btn" onclick="window.print()">🖨️ Imprimir</button>
    </div>
  </div>`;
}

/* ── STOP PAGE ── */
const COND_LABELS={
  diabetes:'Diabetes',renal:'Doença renal',cardiac:'Doença cardiovascular',
  thyroid:'Disfunção tireoidiana',pregnancy:'Gestação / lactação',
  eating_disorder:'Transtorno alimentar',meds:'Uso de medicamentos',
};
const COND_WHY={
  diabetes:'A distribuição de carboidratos e o timing das refeições afetam diretamente a glicemia e podem interagir com insulina ou hipoglicemiantes.',
  renal:'Proteína, fósforo, potássio e sódio precisam ser controlados conforme a taxa de filtração glomerular (TFG).',
  cardiac:'Sódio, gorduras saturadas e trans exigem manejo específico e individualizado.',
  thyroid:'O metabolismo basal fica alterado; alguns alimentos (brassicas, soja) podem interferir na absorção de levotiroxina.',
  pregnancy:'Demandas de folato, ferro, iodo e DHA são elevadas e críticas para o desenvolvimento do bebê.',
  eating_disorder:'Foco em calorias e restrições pode ser gatilho. O suporte deve ser multidisciplinar (nutricionista + psicólogo).',
  meds:'Medicamentos podem alterar absorção de nutrientes, apetite, metabolismo ou interagir com alimentos específicos.',
};
function buildStop(){
  const found = S.conditions.filter(c=>STOP_KEYS.has(c));
  const whyList = found.map(c=>`<li><strong>${COND_LABELS[c]}:</strong> ${COND_WHY[c]}</li>`).join('');
  return `<div class="main"><div class="card stop-card">
    <div class="stop-icon">🩺</div>
    <h2>Encaminhamento necessário</h2>
    <p>Você indicou: <strong>${found.map(c=>COND_LABELS[c]).join(', ')}</strong>.</p>
    <p>Para essas condições, o plano nutricional precisa ser individualizado por um <strong>nutricionista</strong> — e em alguns casos com médico.</p>
    <div class="stop-why">
      <strong>Por que não consigo prescrever dieta aqui?</strong>
      <ul>${whyList}</ul>
    </div>
    <div class="stop-where">
      <strong>Como encontrar um nutricionista no Brasil:</strong>
      <ul>
        <li>CFN (Conselho Federal de Nutricionistas) — cfn.org.br</li>
        <li>UBS / SUAS — nutricionistas do SUS via encaminhamento médico</li>
        <li>Plano de saúde — verifique cobertura de consulta nutricional</li>
      </ul>
    </div>
    <div class="nav-row" style="justify-content:center;gap:12px;margin-top:20px">
      <button class="btn-back" onclick="S.step=3;render()">← Revisar dados</button>
      <button class="btn-primary" onclick="restart()">↩ Recomeçar</button>
    </div>
  </div></div>`;
}

/* ── HELPERS ── */
function restart(){
  Object.assign(S,{step:1,goal:null,age:'',weight:'',height:'',sex:null,activity:null,
    conditions:[],meds:'',allergies:'',diet:null,intolerances:[],budget:null,time:null,proteins:[]});
  render();
}

/* ── INIT ── */
render();
</script>
</body>
</html>
