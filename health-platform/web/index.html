<title>Vitα — Cockpit de Saúde Determinístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* ============================ TOKENS ============================ */
:root{
  --bg:#0B0E14; --surface:#131822; --surface-2:#1A2130; --border:#252E3E;
  --text:#EEF2F8; --muted:#8A94A6; --faint:#5A6376;
  --accent:#FF6A45; --accent-2:#7B61FF;
  --good:#35D6A4; --warn:#FBB03B; --crit:#FF5470;
  --ring-track:#222A38;
  --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 30px rgba(0,0,0,.35);
  --r:16px; --r-sm:10px;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme: light){
  :root{
    --bg:#F4F6FA; --surface:#FFFFFF; --surface-2:#F1F3F8; --border:#E3E7EF;
    --text:#101521; --muted:#5B6472; --faint:#939CAC;
    --accent:#EE4D25; --accent-2:#6446EE;
    --good:#12A97A; --warn:#C97E12; --crit:#DC3B5C;
    --ring-track:#E7EAF1;
    --shadow:0 1px 2px rgba(16,21,33,.04), 0 12px 30px rgba(16,21,33,.06);
  }
}
:root[data-theme="dark"]{
  --bg:#0B0E14; --surface:#131822; --surface-2:#1A2130; --border:#252E3E;
  --text:#EEF2F8; --muted:#8A94A6; --faint:#5A6376;
  --accent:#FF6A45; --accent-2:#7B61FF;
  --good:#35D6A4; --warn:#FBB03B; --crit:#FF5470; --ring-track:#222A38;
  --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 30px rgba(0,0,0,.35);
}
:root[data-theme="light"]{
  --bg:#F4F6FA; --surface:#FFFFFF; --surface-2:#F1F3F8; --border:#E3E7EF;
  --text:#101521; --muted:#5B6472; --faint:#939CAC;
  --accent:#EE4D25; --accent-2:#6446EE;
  --good:#12A97A; --warn:#C97E12; --crit:#DC3B5C; --ring-track:#E7EAF1;
  --shadow:0 1px 2px rgba(16,21,33,.04), 0 12px 30px rgba(16,21,33,.06);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--text); font-family:var(--sans);
  -webkit-font-smoothing:antialiased; line-height:1.5;
  font-size:15px;
}
.mono{font-family:var(--mono)}
.tnum{font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ============================ SHELL ============================ */
.app{display:grid;grid-template-columns:76px 1fr;min-height:100vh}
.rail{
  position:sticky;top:0;height:100vh;border-right:1px solid var(--border);
  background:var(--surface);display:flex;flex-direction:column;align-items:center;
  padding:18px 0;gap:6px;z-index:10;
}
.brand{
  width:40px;height:40px;border-radius:12px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff;font-weight:800;font-size:20px;margin-bottom:14px;
  box-shadow:0 6px 18px -6px var(--accent);
}
.nav{display:flex;flex-direction:column;gap:3px;width:100%;align-items:center;flex:1;min-height:0;overflow-y:auto;overflow-x:visible;scrollbar-width:none}
.nav::-webkit-scrollbar{width:0;height:0}
.nav button{
  width:46px;height:44px;border-radius:11px;border:0;background:transparent;flex:0 0 auto;
  color:var(--muted);display:grid;place-items:center;transition:.18s;position:relative;
}
.nav button svg{width:21px;height:21px;stroke-width:1.8}
.nav button:hover{background:var(--surface-2);color:var(--text)}
.nav button.on{background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent)}
.nav button.on::before{content:"";position:absolute;left:-14px;width:3px;height:22px;border-radius:3px;background:var(--accent)}
.railtip{position:absolute;left:60px;background:var(--surface-2);border:1px solid var(--border);
  padding:4px 10px;border-radius:8px;font-size:12px;white-space:nowrap;opacity:0;pointer-events:none;transition:.15s;transform:translateX(-6px)}
.nav button:hover .railtip{opacity:1;transform:none}

.main{min-width:0;padding:26px clamp(18px,3.5vw,44px) 60px;max-width:1400px}
header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:0 0 6px}
h1.title{font-size:clamp(26px,3vw,34px);font-weight:800;letter-spacing:-.02em;margin:0;text-wrap:balance}
.sub{color:var(--muted);font-size:13px;margin-top:6px}
.toprt{display:flex;align-items:center;gap:10px}
.themebtn{border:1px solid var(--border);background:var(--surface);color:var(--text);
  height:40px;padding:0 14px;border-radius:11px;font-size:13px;display:flex;align-items:center;gap:8px;transition:.15s}
.themebtn:hover{border-color:var(--accent)}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent-2),var(--accent));
  color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px}

/* ============================ PROFILE STRIP ============================ */
.profile{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 18px;margin-bottom:20px;box-shadow:var(--shadow);
  display:flex;gap:22px;align-items:flex-end;flex-wrap:wrap;
}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.field input,.field select{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  height:38px;border-radius:10px;padding:0 10px;font-size:14px;min-width:78px;transition:.15s
}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field.wide input,.field.wide select{min-width:150px}
.seg{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:3px;height:38px}
.seg button{border:0;background:transparent;color:var(--muted);border-radius:7px;padding:0 12px;font-size:13px;font-weight:600;transition:.15s}
.seg button.on{background:var(--accent);color:#fff}
.chips{display:flex;gap:6px;flex-wrap:wrap;max-width:340px}
.chips button{border:1px solid var(--border);background:var(--surface-2);color:var(--muted);
  height:38px;padding:0 12px;border-radius:10px;font-size:13px;font-weight:600;transition:.15s}
.chips button:hover{color:var(--text);border-color:var(--accent)}
.chips button.on{background:color-mix(in srgb,var(--accent) 16%,transparent);border-color:var(--accent);color:var(--accent)}
.anamnese{margin-top:-8px}

/* ============================ GRID / CARDS ============================ */
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:20px;box-shadow:var(--shadow);min-width:0;
}
.card h3{margin:0 0 2px;font-size:14px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.card .cap{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:16px}
.span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-5{grid-column:span 5}
.span-6{grid-column:span 6}.span-7{grid-column:span 7}.span-8{grid-column:span 8}.span-12{grid-column:span 12}
@media(max-width:1080px){.span-3,.span-4,.span-5{grid-column:span 6}.span-7,.span-8{grid-column:span 12}}
@media(max-width:720px){[class*=span-]{grid-column:span 12!important}}

/* energy ring hero */
.energy{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
.ringwrap{position:relative;width:190px;height:190px;flex:0 0 auto}
.ringwrap .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.ringwrap .big{font-size:40px;font-weight:800;letter-spacing:-.03em;line-height:1}
.ringwrap .unit{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.1em;margin-top:4px}
.legend{display:flex;flex-direction:column;gap:14px;flex:1;min-width:200px}
.legrow{display:flex;align-items:center;gap:12px}
.dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
.legrow .lab{flex:1}
.legrow .lab b{display:block;font-size:14px}
.legrow .lab span{font-size:11.5px;color:var(--muted);font-family:var(--mono)}
.legrow .val{font-weight:700;font-size:16px}
.legrow .val small{color:var(--muted);font-weight:500;font-size:12px}

/* macro bars */
.macro{margin-bottom:16px}
.macro:last-child{margin-bottom:0}
.macro .mh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;font-size:13px}
.macro .mh b{font-weight:700}
.macro .mh .g{font-family:var(--mono);color:var(--muted)}
.track{height:9px;border-radius:6px;background:var(--ring-track);overflow:hidden}
.fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.src{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:6px}

/* stat tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px}
.tile .k{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.tile .v{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:6px;line-height:1}
.tile .v small{font-size:12px;color:var(--muted);font-weight:600}
.tile .meta{font-size:11px;color:var(--muted);margin-top:4px}

/* pills */
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;
  font-weight:600;letter-spacing:.04em;padding:3px 9px;border-radius:20px;text-transform:uppercase}
.pill.good{background:color-mix(in srgb,var(--good) 16%,transparent);color:var(--good)}
.pill.warn{background:color-mix(in srgb,var(--warn) 18%,transparent);color:var(--warn)}
.pill.crit{background:color-mix(in srgb,var(--crit) 16%,transparent);color:var(--crit)}
.pill.accent{background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent)}

/* workout / meals lists */
.list{display:flex;flex-direction:column;gap:2px}
.li{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;transition:.15s}
.li:hover{background:var(--surface-2)}
.li .idx{font-family:var(--mono);font-size:11px;color:var(--faint);width:20px}
.li .nm{flex:1;min-width:0}
.li .nm b{font-size:13.5px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li .nm span{font-size:11px;color:var(--muted);font-family:var(--mono)}
.li .rt{text-align:right;font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
.li .rt b{color:var(--text);font-size:13px}
.daytag{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;
  color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.08em}
.daytag::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent)}
.daytag:first-child{margin-top:0}

/* trend sparkline */
.spark{width:100%;height:90px;display:block}
.trendhead{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.trendhead .now{font-size:34px;font-weight:800;letter-spacing:-.02em;line-height:1}
.trendhead .now small{font-size:14px;color:var(--muted);font-weight:600}
.deltarow{display:flex;gap:16px;margin-top:14px;font-size:12px;color:var(--muted)}
.deltarow b{color:var(--text)}

/* guardrail banner */
.banner{border-radius:var(--r);padding:16px 18px;margin-bottom:20px;display:flex;gap:14px;align-items:flex-start;
  border:1px solid;font-size:13.5px}
.banner.crit{background:color-mix(in srgb,var(--crit) 12%,var(--surface));border-color:color-mix(in srgb,var(--crit) 45%,var(--border));color:var(--text)}
.banner.warn{background:color-mix(in srgb,var(--warn) 12%,var(--surface));border-color:color-mix(in srgb,var(--warn) 40%,var(--border))}
.banner .ic{flex:0 0 auto;margin-top:1px}
.banner b{display:block;margin-bottom:2px}
.banner .msg{color:var(--muted)}

/* labs */
.labrow{display:grid;grid-template-columns:minmax(140px,1.4fr) 110px 1fr auto;gap:12px;align-items:center;
  padding:10px 12px;border-radius:10px;transition:.15s}
.labrow:hover{background:var(--surface-2)}
.labrow .ln b{font-size:13.5px;font-weight:600;display:block}
.labrow .ln span{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
.labrow input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  height:36px;border-radius:9px;padding:0 10px;font-size:14px;width:100%;font-family:var(--mono)}
.labrow input:focus{border-color:var(--accent)}
.labbar{position:relative;height:8px;border-radius:5px;background:var(--ring-track)}
.labbar .zone{position:absolute;top:0;height:100%;border-radius:5px;background:color-mix(in srgb,var(--good) 32%,transparent)}
.labbar .mark{position:absolute;top:-3px;width:3px;height:14px;border-radius:2px;background:var(--text)}
@media(max-width:720px){.labrow{grid-template-columns:1fr 90px auto}.labbar{display:none}}

/* habits */
.habgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.hab{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--r-sm);
  background:var(--surface-2);border:1px solid var(--border);cursor:pointer;transition:.18s;user-select:none}
.hab:hover{border-color:var(--accent)}
.hab.done{background:color-mix(in srgb,var(--good) 12%,var(--surface-2));border-color:color-mix(in srgb,var(--good) 45%,var(--border))}
.hab .ic{font-size:20px}
.hab .hn{flex:1;font-size:13.5px;font-weight:600}
.hab .chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:grid;place-items:center;
  font-size:12px;color:transparent;transition:.18s;flex:0 0 auto}
.hab.done .chk{background:var(--good);border-color:var(--good);color:#fff}
.streakbig{display:flex;align-items:baseline;gap:10px}
.streakbig .n{font-size:52px;font-weight:800;letter-spacing:-.03em;line-height:1;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
.streakbig .u{font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* week tabs */
.wtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.wtabs button{border:1px solid var(--border);background:var(--surface-2);color:var(--muted);
  height:34px;padding:0 13px;border-radius:9px;font-size:12.5px;font-weight:600;transition:.15s}
.wtabs button:hover{color:var(--text)}
.wtabs button.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* calculadoras */
.calcinputs{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.calcinputs .field input,.calcinputs .field select{background:var(--surface-2);border:1px solid var(--border);color:var(--text);height:38px;border-radius:10px;padding:0 10px;font-size:14px;min-width:110px;font-family:var(--mono)}
.calcinputs .field input:disabled{color:var(--muted);opacity:.7}
.calcout{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.calcout{grid-template-columns:1fr}}
.cores{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px}
.cores .k{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.cores .v{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:6px;line-height:1}
.cores .v small{font-size:13px;color:var(--muted);font-weight:600}
.cores .meta{font-size:11px;color:var(--muted);margin-top:5px;font-family:var(--mono)}
.zones{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.zrow{display:flex;align-items:center;gap:12px;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px}
.zbadge{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;color:#fff}
.zbadge.z1{background:#5a8dee}.zbadge.z2{background:var(--good)}.zbadge.z3{background:var(--warn)}.zbadge.z4{background:var(--accent)}.zbadge.z5{background:var(--crit)}
.zlab{flex:1}.zlab b{font-size:13px;display:block}.zlab span{font-size:11px;color:var(--muted);font-family:var(--mono)}
.zval{font-family:var(--mono);font-weight:700;font-size:14px}.zval small{color:var(--muted);font-weight:500}

/* roster do profissional */
.rtable{display:flex;flex-direction:column;gap:2px}
.rhead,.rrow{display:grid;grid-template-columns:1.4fr 1.1fr .8fr .9fr .7fr .9fr;gap:10px;align-items:center;padding:10px 12px}
.rhead{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--border)}
.rrow{border-radius:10px;cursor:pointer;transition:.15s}
.rrow:hover{background:var(--surface-2)}
.rrow.active{background:color-mix(in srgb,var(--accent) 10%,transparent)}
.rrow .rn b{font-size:14px}
.rmuted{color:var(--muted);font-size:12.5px}
@media(max-width:720px){.rhead{display:none}.rrow{grid-template-columns:1fr auto;gap:6px}.rrow>span:nth-child(2),.rrow>span:nth-child(4),.rrow>span:nth-child(5){display:none}}

/* agenda do dia */
.tl{display:flex;flex-direction:column}
.tlrow{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-left:2px solid var(--border);margin-left:44px;padding-left:16px;position:relative}
.tlrow .tlt{position:absolute;left:-44px;top:10px;font-family:var(--mono);font-size:11px;color:var(--muted);width:38px;text-align:right}
.tlrow .tlic{font-size:16px;margin-left:-25px;background:var(--surface);border-radius:50%;z-index:1}
.tlrow .tlc b{font-size:13.5px;display:block}
.tlrow .tlc span{font-size:11.5px;color:var(--muted)}
.tlrow.past{opacity:.5}

/* evolução consolidada */
.evogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.evop{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px}
.evohd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;gap:8px}
.evol{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.evocur{font-family:var(--mono);font-size:18px;font-weight:800}
.evocur small{font-size:11px;color:var(--muted);font-weight:600}
.evop .spark{height:52px}
.evod{font-family:var(--mono);font-size:11px;margin-top:5px}

/* medidas corporais */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.mfield{display:flex;flex-direction:column;gap:5px}
.mfield label{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
.mfield .wnum{width:100%}

/* anamnese guiada */
.anamsec{margin-bottom:16px}
.anamsec-t{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.anamq{display:flex;align-items:center;gap:12px;justify-content:space-between;padding:7px 0;flex-wrap:wrap}
.anamq-t{font-size:13.5px;flex:1;min-width:180px}
.anamseg{height:34px}.anamseg button{padding:0 14px}

/* conquistas */
.achgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.ach{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--r-sm);background:var(--surface-2);border:1px solid var(--border);opacity:.45;transition:.2s}
.ach.done{opacity:1;border-color:color-mix(in srgb,var(--good) 45%,var(--border))}
.ach .aic{font-size:22px;filter:grayscale(1)}
.ach.done .aic{filter:none}
.ach .anm{flex:1;min-width:0}
.ach .anm b{font-size:13px;display:block}
.ach .anm span{font-size:10.5px;color:var(--muted);font-family:var(--mono);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* sessão ao vivo */
.sesscard{border-color:color-mix(in srgb,var(--accent) 45%,var(--border))}
.sessex b{font-size:20px;font-weight:800;letter-spacing:-.01em;display:block}
.sessex span{font-family:var(--mono);font-size:12px;color:var(--muted)}
.restbox{display:flex;align-items:center;gap:12px;margin-top:12px;padding:12px 14px;border-radius:var(--r-sm);background:var(--surface-2);border:1px solid var(--border)}
.resttime{font-family:var(--mono);font-size:24px;font-weight:800;color:var(--accent)}
.resttime.soon{color:var(--warn)}
.resttime.done{color:var(--good);font-size:14px;font-weight:700}

/* registro de treino */
.wlogp .wsetrow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.setchip{font-family:var(--mono);font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 8px}
.wnum{width:72px;background:var(--surface);border:1px solid var(--border);color:var(--text);height:36px;border-radius:9px;padding:0 10px;font-size:14px;font-family:var(--mono)}
.wnum:focus{border-color:var(--accent)}

/* fotos de evolução */
.photobtn{display:inline-flex;align-items:center;height:38px;cursor:pointer}
.pgal{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.pgal .pth{position:relative;margin:0}
.pth img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:10px;border:1px solid var(--border);display:block}
.pth figcaption{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px;text-align:center}
.pthrm{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.55);color:#fff;border-radius:6px;line-height:1}
.cmp{margin-bottom:16px}
.cmphd{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-bottom:8px}
.cmprow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cmprow figure{margin:0}
.cmprow img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:10px;border:1px solid var(--border);display:block}
.cmprow figcaption{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:5px;text-align:center}

/* diário alimentar */
.logadd{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.logadd select{flex:1;min-width:150px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);height:38px;border-radius:10px;padding:0 10px;font-size:13.5px}
.logadd input{width:90px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);height:38px;border-radius:10px;padding:0 10px;font-size:14px;font-family:var(--mono)}
.logadd select:focus,.logadd input:focus{border-color:var(--accent)}
.rmbtn{border:0;background:transparent;color:var(--faint);font-size:14px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:.15s;margin-left:6px}
.rmbtn:hover{background:color-mix(in srgb,var(--crit) 16%,transparent);color:var(--crit)}

/* barra de volume (landmarks) */
.vbar{position:relative;flex:1;height:10px;border-radius:6px;background:var(--ring-track);overflow:visible;min-width:80px}
.vfill{height:100%;border-radius:6px;transition:width .4s}
.vfill.below{background:var(--warn)}.vfill.prod{background:var(--good)}.vfill.high{background:var(--accent)}.vfill.over{background:var(--crit)}
.vmev,.vmav{position:absolute;top:-2px;width:2px;height:14px;background:var(--faint);opacity:.7}
.vmav{background:var(--text);opacity:.4}

/* swaps */
.li.swap{cursor:pointer}
.swapic{color:var(--faint);font-size:11px;transition:.15s}
.li.swap:hover .swapic{color:var(--accent)}
.li.swap.op{background:var(--surface-2)}
.li.swap.op .swapic{color:var(--accent)}
.subs{margin:2px 0 8px 32px;padding:10px 12px;border-left:2px solid var(--accent);background:var(--surface-2);border-radius:0 8px 8px 0}
.subttl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-bottom:8px}
.subrow{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:13px}
.subrow b{flex:1;font-weight:600}
.subrow .tnum{font-family:var(--mono);color:var(--muted);font-size:12px}

/* coach */
.coachlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.coachmsg{display:flex;gap:12px;padding:14px;border-radius:var(--r-sm);background:var(--surface-2);
  border:1px solid var(--border);border-left:3px solid var(--accent);font-size:13.5px}
.coachmsg.alert{border-left-color:var(--crit)}
.coachmsg.reminder{border-left-color:var(--warn)}
.coachmsg.motivation{border-left-color:var(--good)}
.coachmsg .cic{font-size:18px;flex:0 0 auto}
.coachmsg b{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:3px}
.minibtn{margin-left:auto;border:1px solid var(--border);background:var(--surface-2);color:var(--muted);
  height:30px;padding:0 12px;border-radius:8px;font-size:11.5px;font-weight:600;transition:.15s}
.minibtn:hover{border-color:var(--accent);color:var(--accent)}
.card h3{justify-content:flex-start}

/* relatório de prontuário (oculto na tela; visível só na impressão) */
#report{display:none}
.rep{color:#111;font-size:12px;line-height:1.45;max-width:720px;margin:0 auto}
.rep .rephead{border-bottom:2px solid #111;padding-bottom:8px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:6px}
.rep h2{margin:0;font-size:20px}
.rep h3{font-size:13px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #bbb;padding-bottom:3px;margin:16px 0 8px}
.rep table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
.rep td{padding:3px 6px;border-bottom:1px solid #eee}
.rep td:last-child{text-align:right;font-weight:600}
.rep .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 24px}
.rep .repfoot{margin-top:18px;padding-top:8px;border-top:1px solid #bbb;color:#666;font-size:10px}
.rep ul{margin:4px 0;padding-left:18px}

/* impressão: dois modos — lista de compras OU prontuário completo */
@media print{
  body{background:#fff;color:#000}
  .rail,.top,.profile,.anamnese,.footer,#guardslot{display:none!important}
  .app{display:block}.main{padding:0;max-width:none}
  #views,#report{display:none!important}
  .minibtn,.rmbtn{display:none!important}
  /* modo lista de compras */
  body.print-shop #views{display:block!important}
  body.print-shop .grid{display:block}
  body.print-shop .card{box-shadow:none;border:none;padding:0}
  body.print-shop .card:not(.printable){display:none!important}
  /* modo prontuário completo */
  body.print-report #report{display:block!important}
}

/* mobile polish */
@media(max-width:600px){
  .app{grid-template-columns:58px 1fr}
  .rail{padding:12px 0}
  .brand{width:34px;height:34px;font-size:16px;margin-bottom:8px;border-radius:10px}
  .nav button{width:40px;height:38px}
  .nav button svg{width:19px;height:19px}
  .railtip{display:none}
  .main{padding:16px 12px 48px}
  h1.title{font-size:22px}
  .toprt{flex-wrap:wrap}
  .themebtn{height:36px;padding:0 10px;font-size:12px}
  .profile{padding:12px;gap:12px}
  .field input,.field select{height:36px;min-width:64px;font-size:13px}
  .card{padding:14px;border-radius:12px}
  .ringwrap{width:150px!important;height:150px!important}
  .ringwrap svg{width:100%;height:100%} /* SVG tem viewBox — escala junto */
  .ringwrap .big{font-size:30px!important}
  .trendhead .now{font-size:26px}
  .calcinputs .field input,.calcinputs .field select{min-width:88px}
}

.footer{margin-top:32px;padding-top:18px;border-top:1px solid var(--border);
  font-size:11.5px;color:var(--faint);font-family:var(--mono);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.footer a{color:var(--muted);text-decoration:none}
.determinism{display:inline-flex;align-items:center;gap:6px}
.determinism .led{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good)}
</style>

<script>
"use strict";
/* ======================================================================
   MOTOR DETERMINÍSTICO — porte de engine/*.js para o navegador.
   Funções puras: mesmo input → mesmo output. Cada saída carrega fonte.
   ====================================================================== */
const R=(v,d=1)=>Math.round(v*10**d)/10**d;
const AF={sedentary:1.2,light:1.375,moderate:1.55,high:1.725,athlete:1.9};
const GOAL={fat_loss:{d:-20,g:"Helms 2014: −15–25% TDEE"},hypertrophy:{d:10,g:"Iraki 2019: +5–15% TDEE"},maintenance:{d:0,g:"manutenção"}};

function bmrMifflin({weightKg,heightCm,age,sex}){const b=10*weightKg+6.25*heightCm-5*age;return R(sex==="M"?b+5:b-161,0);}
function bmrKatch(lbm){return R(370+21.6*lbm,0);}
function bmr(p){if(p.bf!=null&&p.bf>0){const lbm=p.weightKg*(1-p.bf/100);return{value:bmrKatch(lbm),formula:"KATCH_MCARDLE",source:"Katch-McArdle"};}return{value:bmrMifflin(p),formula:"MIFFLIN_ST_JEOR",source:"Mifflin-St Jeor 1990"};}
function tdee(p){const b=bmr(p);return{value:R(b.value*AF[p.activity],0),b};}
function targetKcal(p){const t=tdee(p).value,adj=GOAL[p.goal]||GOAL.maintenance,floor=bmr(p).value*1.1;
  // ajuste de adaptação acumulado (aplicado pelo motor de adaptação, com piso de segurança)
  const adaptMult=1+((p.kcalAdjustPct||0)/100);
  const raw=t*(1+adj.d/100)*adaptMult;
  return{value:R(Math.max(raw,floor),0),source:adj.g,floored:raw<floor,tdee:t,adaptPct:p.kcalAdjustPct||0};}
function macros(p){
  const kc=targetKcal(p);let protein,psrc;
  if(p.goal==="fat_loss"&&p.bf>0){const lbm=p.weightKg*(1-p.bf/100);protein=R(2.6*lbm,0);psrc="Helms: 2,3–3,1 g/kg MM (déficit)";}
  else{protein=R(1.8*p.weightKg,0);psrc="ISSN 2017: 1,4–2,0 g/kg";}
  const fat=R(0.8*p.weightKg,0),carb=R(Math.max(0,(kc.value-protein*4-fat*9)/4),0),fiber=R(14*kc.value/1000,0);
  return{kcal:kc.value,tdee:kc.tdee,protein,fat,carb,fiber,floored:kc.floored,
    src:{kcal:kc.source,protein:psrc,fat:"ISSN: ≥0,8 g/kg",fiber:"IOM/DRI 2005"}};
}
function bmi(p){const h=p.heightCm/100;return R(p.weightKg/(h*h),1);}
function ffmi(p){if(!(p.bf>0))return null;const h=p.heightCm/100,lbm=p.weightKg*(1-p.bf/100);return R(lbm/(h*h)+6.1*(1.8-h),1);}
function waterMl(p,tmin=45){return Math.round(35*p.weightKg+Math.round(tmin/60)*750);}
function hrZones(age,rest=60){const hrMax=Math.round(208-0.7*age);const z=(lo,hi)=>({min:Math.round(rest+lo*(hrMax-rest)),max:Math.round(rest+hi*(hrMax-rest))});return{hrMax,z2:z(.6,.7),z4:z(.8,.9)};}
function hrZonesFull(age,rest){const hrMax=Math.round(208-0.7*age);const z=(lo,hi)=>({min:Math.round(rest+lo*(hrMax-rest)),max:Math.round(rest+hi*(hrMax-rest))});return{hrMax,z1:z(.5,.6),z2:z(.6,.7),z3:z(.7,.8),z4:z(.8,.9),z5:z(.9,1)};}
/* RFM: %gordura por altura+cintura, validado vs DXA (Woolcott & Bergman 2018) */
function rfm(sex,heightCm,waistCm){if(!(waistCm>0))return null;return R((sex==="M"?64:76)-20*(heightCm/waistCm),1);}
function zone2Weekly(goal){const endur=["performance","running","cycling"].includes(goal);return{min:endur?240:150,max:endur?400:200,sessionMin:45};}
/* landmarks MEV/MAV/MRV por músculo (Israetel/RP + Pelland 2024) */
const VOL={"Quadríceps":{mev:8,mav:16,mrv:20},"Posteriores":{mev:6,mav:14,mrv:18},"Glúteos":{mev:4,mav:12,mrv:16},"Peito":{mev:8,mav:16,mrv:22},"Ombros":{mev:8,mav:18,mrv:26},"Costas":{mev:10,mav:18,mrv:25},"Dorsais":{mev:10,mav:18,mrv:25},"Core":{mev:6,mav:16,mrv:25}};
function classifyVol(mu,sets){const lm=VOL[mu]||{mev:8,mav:16,mrv:22};let st;if(sets<lm.mev)st="below";else if(sets<=lm.mav)st="prod";else if(sets<=lm.mrv)st="high";else st="over";return{mu,sets,st,...lm};}
/* periodização em mesociclo: acúmulo rampa volume/RIR, última semana = deload */
function periodize(week,mesoLen=5){const w=Math.max(1,Math.min(week,mesoLen));
  if(w>=mesoLen)return{w,mesoLen,phase:"deload",setMult:.5,intMult:.8,rir:4,note:"Deload: 50% do volume, 80% da carga, longe da falha — dissipa fadiga."};
  const acc=mesoLen-1,t=acc>1?(w-1)/(acc-1):0,setMult=Math.round((1+t*.5)*100)/100,rir=Math.max(1,3-Math.round(t*2));
  return{w,mesoLen,phase:"accumulation",setMult,intMult:1,rir,prog:Math.round(t*100),note:`Acúmulo: volume em ${Math.round(setMult*100)}% da base, alvo RIR ${rir}.`};}
/* --- calculadoras determinísticas (fórmula nomeada + fonte) --- */
function oneRmEpley(load,reps){return reps<1?null:R(reps===1?load:load*(1+reps/30),1);}
function oneRmBrzycki(load,reps){return(reps<1||reps>=37)?null:R(reps===1?load:load*(36/(37-reps)),1);}
const RMPCT={1:1,2:.97,3:.94,4:.92,5:.89,6:.86,8:.81,10:.75,12:.71,15:.65};
function loadForReps(rm,reps){const p=RMPCT[reps]!=null?RMPCT[reps]:Math.max(.5,1-.0333*(reps-1));return{load:R(rm*p,1),pct:Math.round(p*100)};}
function pacePerKm(km,min){if(km<=0)return null;const mpk=min/km,mm=Math.floor(mpk);let ss=Math.round((mpk-mm)*60),MM=mm;if(ss===60){MM++;ss=0;}return{label:`${MM}:${String(ss).padStart(2,"0")}`,kmh:R(60/mpk,1)};}
const MET={caminhada:3.5,corrida_leve:8.3,corrida_forte:11,ciclismo:8,natacao:7,musculacao:5,hiit:8.5,funcional:6,yoga:2.5,futebol:7};
const METNAME={caminhada:"Caminhada",corrida_leve:"Corrida leve",corrida_forte:"Corrida forte",ciclismo:"Ciclismo",natacao:"Natação",musculacao:"Musculação",hiit:"HIIT",funcional:"Funcional",yoga:"Yoga",futebol:"Futebol"};
function activityKcal(act,kg,min){const met=MET[act];return met==null?null:{kcal:Math.round(met*kg*(min/60)),met};}
function vo2maxCooper(m){return R((m-504.9)/44.73,1);}
/* --- substituição inteligente: isocalórica, menor distância de macros --- */
function findSubs(food,pool,limit=3){
  const d=(a,b)=>{const ka=Math.max(a.kcal,1),kb=Math.max(b.kcal,1);return Math.hypot(a.p/ka-b.p/kb,a.ch/ka-b.ch/kb,a.f/ka-b.f/kb);};
  return pool.filter(f=>f.n!==food.n).map(f=>({f,s:d(food,f)+(f.c===food.c?0:.05)})).sort((a,b)=>a.s-b.s||a.f.n.localeCompare(b.f.n)).slice(0,limit)
    .map(({f,s})=>({n:f.n,g:Math.round(food.kcal/Math.max(f.kcal,1)*100),sim:Math.round((1-Math.min(s,1))*1000)/1000}));
}

/* --- análise nutricional de precisão (micros vs DRI, PDCAAS, carga glicêmica) --- */
const MTG={k:{M:3400,F:2600,l:"Potássio",u:"mg"},mg:{M:400,F:310,l:"Magnésio",u:"mg"},fe:{M:8,F:18,l:"Ferro",u:"mg"},zn:{M:11,F:8,l:"Zinco",u:"mg"},ca:{M:1000,F:1000,l:"Cálcio",u:"mg"},vc:{M:90,F:75,l:"Vitamina C",u:"mg"},va:{M:900,F:700,l:"Vitamina A",u:"µg"},o3:{M:1.6,F:1.1,l:"Ômega-3",u:"g"},na:{M:2300,F:2300,l:"Sódio",u:"mg",ceil:1}};
// fontes alimentares mais ricas num micronutriente (por 100 g) — para orientação educativa
function foodSourcesFor(k,limit){return [...FOODS].filter(f=>f.mi&&f.mi[k]>0).sort((a,b)=>(b.mi[k]||0)-(a.mi[k]||0)||a.n.localeCompare(b.n)).slice(0,limit||4);}
function analyzeMicros(items,sex){
  const tot={};Object.keys(MTG).forEach(k=>tot[k]=0);
  for(const{food,g}of items){const mi=food.mi||{};Object.keys(MTG).forEach(k=>tot[k]+=(mi[k]||0)*g/100);}
  return Object.keys(MTG).map(k=>{const t=MTG[k],target=t[sex]!=null?t[sex]:t.M,amount=Math.round(tot[k]*10)/10,pct=Math.round(amount/target*100);
    let st;if(t.ceil)st=pct>100?"over":"ok";else if(pct<70)st="low";else if(pct<=140)st="ok";else st="high";
    return{k,l:t.l,u:t.u,amount,target,pct,ceil:!!t.ceil,st};});
}
function proteinQuality(items){
  let pt=0,w=0,leg=false,cer=false,ani=false;
  for(const{food,g}of items){const p=food.p*g/100;if(p<=0)continue;pt+=p;w+=(food.pd!=null?food.pd:.7)*p;
    if(food.c==="legumes")leg=true;if(food.c==="cereals"||food.c==="tubers")cer=true;if(["meats","fish","eggs","dairy"].includes(food.c))ani=true;}
  if(pt===0)return{score:0,pt:0,comp:false,lim:null};
  let s=w/pt;const comp=!ani&&leg&&cer;if(comp)s=Math.min(1,s+.1);
  const lim=ani?null:(leg&&!cer?"metionina":(!leg&&cer?"lisina":null));
  return{score:Math.round(s*100)/100,pt:Math.round(pt),comp,lim};
}
function glycemicLoad(items){let gl=0,ct=0;for(const{food,g}of items){const carb=food.ch*g/100;ct+=carb;if(food.gi!=null)gl+=food.gi*carb/100;}gl=Math.round(gl);return{gl,ct:Math.round(ct),st:gl<=80?"low":gl<=120?"medium":"high"};}
function proteinDist(meals,kg){const target=Math.round(.4*kg);const rows=meals.map(m=>{const p=Math.round(m.p||0),leu=Math.round(.085*p*10)/10;return{s:m.s,p,leu,target,ad:p>=target&&leu>=2.5,pct:Math.round(p/target*100)};});return{target,rows,nAd:rows.filter(r=>r.ad).length,n:rows.length};}
/* --- diário alimentar: consumo real + aderência ao alvo --- */
function sumIntake(items){let kcal=0,p=0,c=0,f=0;for(const{food,g}of items){kcal+=food.kcal*g/100;p+=food.p*g/100;c+=food.ch*g/100;f+=food.f*g/100;}return{kcal:Math.round(kcal),p:Math.round(p),c:Math.round(c),f:Math.round(f)};}
function adherenceScore(cons,tg){const kd=tg.kcal?Math.abs(cons.kcal-tg.kcal)/tg.kcal:0;const pd=tg.p?Math.max(0,tg.p-cons.p)/tg.p:0;const sc=Math.max(0,Math.min(100,Math.round(100-kd*100-pd*50)));return{ad:sc,kd:Math.round(kd*100),st:sc>=85?"high":sc>=60?"ok":"low"};}

/* --- prontuário: múltiplos pacientes com histórico próprio --- */
function pAll(){try{return JSON.parse(localStorage.getItem("vita.patients")||"[]");}catch(e){return[];}}
function pSave(a){try{localStorage.setItem("vita.patients",JSON.stringify(a));}catch(e){}}
function pActiveId(){return localStorage.getItem("vita.active")||"";}
function pSetActive(id){try{localStorage.setItem("vita.active",id);}catch(e){}}
function pActive(){const a=pAll();return a.find(x=>x.id===pActiveId())||a[0]||null;}
function pUpdate(fn){const a=pAll(),i=a.findIndex(x=>x.id===(pActiveId()||(a[0]&&a[0].id)));if(i<0)return;fn(a[i]);pSave(a);}
function pNewId(){return "p"+(pAll().reduce((m,x)=>Math.max(m,+(String(x.id||"p0").slice(1))||0),0)+1);}
function pAdd(name){const a=pAll(),id=pNewId();a.push({id,name:name||("Paciente "+(a.length+1)),profile:{},labs:{},weighins:[],habits:{}});pSave(a);pSetActive(id);}
function pEnsure(){
  let a=pAll();
  if(!a.length){
    let oldP=null,oldH={};try{oldP=JSON.parse(localStorage.getItem("vita.profile")||"null");}catch(e){}try{oldH=JSON.parse(localStorage.getItem("vita.habits")||"{}");}catch(e){}
    a=[{id:"p1",name:(oldP&&oldP.name)||"Paciente 1",profile:oldP||{},labs:(oldP&&oldP.labs)||{},weighins:[],habits:oldH||{}}];
    pSave(a);pSetActive("p1");
  }
  if(!pActiveId())pSetActive(a[0].id);
}

/* --- guardrails --- */
function guardrails(p){
  const f=[];const an=p.anamnese||{};
  if(an.chest_pain)f.push({sev:"crit",code:"Dor torácica ao esforço",msg:"Dor no peito ao esforço exige avaliação cardiológica ANTES de treinar. Se for atual, procure emergência."});
  if(an.pregnancy)f.push({sev:"crit",code:"Gestação/lactação",msg:"Estado que exige acompanhamento individualizado. O sistema não gera déficit nem estratégias restritivas."});
  if(an.t1_diabetes)f.push({sev:"crit",code:"Diabetes tipo 1",msg:"Exige plano supervisionado por equipe de saúde. Jejum e cetogênica ficam bloqueados."});
  if([an.extreme_restriction,an.compensatory,an.body_image].filter(Boolean).length>=2)f.push({sev:"crit",code:"Sinais de transtorno alimentar",msg:"Suas respostas indicam um padrão que merece cuidado especializado. Procure profissional de saúde mental e nutricionista. CVV: 188."});
  if(p.goal==="fat_loss"&&bmi(p)<17.5)f.push({sev:"crit",code:"IMC<17,5 + emagrecimento",msg:"Emagrecer com IMC abaixo de 17,5 não é seguro. Recomendamos avaliação médica e nutricional antes de qualquer déficit."});
  if(p.age<16)f.push({sev:"crit",code:"Menor de 16",msg:"Menores de 16 anos precisam de responsável cadastrado."});
  const t=targetKcal(p);if(t.floored)f.push({sev:"warn",code:"Piso calórico 1,1×TMB",msg:"A meta calórica atingiu o piso de segurança de 1,1×TMB — o motor não corta abaixo disso para preservar massa magra e metabolismo."});
  return f;
}

const STRATEGIES={
  flexible:{n:"Flexível",req:[],exc:[],contra:[]},
  low_carb:{n:"Low carb",req:[],exc:[],contra:["t1_diabetes"],carbMaxPct:25},
  keto:{n:"Cetogênica",req:["keto"],exc:[],contra:["t1_diabetes","kidney"],carbMaxPct:10},
  vegetarian:{n:"Vegetariana",req:["veg"],exc:[],contra:[]},
  vegan:{n:"Vegana",req:["vegan"],exc:[],contra:[]},
  gluten_free:{n:"Sem glúten",req:["gf"],exc:[],contra:[]},
};
const ALLERGY_TAG={lactose:"lf",gluten:"gf"};
function eligibleFoods(strategy,allergies){
  const s=STRATEGIES[strategy]||STRATEGIES.flexible;
  return FOODS.filter(f=>{
    if(s.req.some(t=>!f.t.includes(t)))return false;
    if(s.exc.some(t=>f.t.includes(t)))return false;
    for(const a of allergies){const need=ALLERGY_TAG[a];if(need&&!f.t.includes(need))return false;}
    return true;
  });
}
function strategyAllowed(strategy,conditions){const s=STRATEGIES[strategy]||STRATEGIES.flexible;return !s.contra.some(c=>conditions.includes(c));}

// rotate: dia N usa a N-ésima melhor fonte de cada ranking — variedade sem sorteio.
function buildMeal(pool,tk,tp,rotate=0){
  const prot=pool.filter(x=>x.p/Math.max(x.kcal,1)>.08&&x.p>=12).sort((a,b)=>b.p/b.kcal-a.p/a.kcal||a.n.localeCompare(b.n));
  const carb=pool.filter(x=>x.ch>x.p&&x.ch>x.f&&x.kcal<200).sort((a,b)=>b.ch-a.ch||a.n.localeCompare(b.n));
  const fat=pool.filter(x=>x.f/Math.max(x.kcal,1)>.05&&x.p/Math.max(x.kcal,1)<=.08).sort((a,b)=>b.f/b.kcal-a.f/a.kcal||a.n.localeCompare(b.n));
  const pick=l=>l.length?l[rotate%l.length]:null;
  const items=[];let kc=0,pr=0;
  const add=(fd,g)=>{g=Math.round(g/5)*5;if(g<10)return;items.push({n:fd.n,g,kcal:Math.round(fd.kcal*g/100),p:Math.round(fd.p*g/100)});kc+=fd.kcal*g/100;pr+=fd.p*g/100;};
  const P=pick(prot),C=pick(carb),F=pick(fat);
  if(P)add(P,Math.min(tp*.85/P.p*100,300));
  if(C&&kc<tk)add(C,(tk-kc)*.8/C.kcal*100);
  if(F&&kc<tk*.95)add(F,Math.min((tk-kc)/F.kcal*100,30));
  return{items,kcal:Math.round(kc),p:Math.round(pr)};
}
function dayPlan(m,pool,dayIndex=0){return MEALS.map(ms=>({...ms,tk:Math.round(m.kcal*ms.pct),...buildMeal(pool,m.kcal*ms.pct,Math.min(Math.round(m.protein*ms.pct*1.15),40),dayIndex)}));}
function weekPlan(m,pool){
  const days=WEEK_DAYS.map((label,i)=>({label,plan:dayPlan(m,pool,i)}));
  const grams=new Map();
  for(const d of days)for(const ms of d.plan)for(const it of ms.items)grams.set(it.n,(grams.get(it.n)||0)+it.g);
  const shop=[...grams.entries()].map(([n,g])=>({n,g})).sort((a,b)=>b.g-a.g||a.n.localeCompare(b.n));
  return{days,shop};
}

function interpretLab(v,r){
  if(r.clo!=null&&v<r.clo)return"critical";
  if(r.chi!=null&&v>r.chi)return"critical";
  if(r.lo!=null&&v<r.lo)return"below";
  if(r.hi!=null&&v>r.hi)return"above";
  return"in";
}

function saveLabSnapshot(){
  const filled=LABS.filter(l=>LABVALS[l.c]!=null&&LABVALS[l.c]!=="");

function addWater(ml,targetMl){
  pUpdate(p=>{p.water=p.water||{};const t=todayKey();
    p.water[t]=Math.max(0,(p.water[t]||0)+ml);
    if(p.water[t]>=targetMl){p.habits=p.habits||{};const h=new Set(p.habits[t]||[]);h.add("water");p.habits[t]=[...h];}

}

  {c:"FULL_PROFILE",n:"Anamnese completa",ic:"📋",xp:100,d:"Respondeu 70%+ da anamnese",when:s=>s.anamPct>=70},
];
function gamiState(pt){
  const foodDays=Object.keys(pt.foodlog||{}).length;
  const wl=pt.wlog||{};const wdays=new Set();Object.values(wl).forEach(a=>a.forEach(s=>wdays.add(s.d)));
  // melhor streak histórico de hábitos (≥3/dia)
  const hd=Object.keys(pt.habits||{}).filter(d=>(pt.habits[d]||[]).length>=3).sort();
  let best=0,cur=0,prev=null;
  for(const d of hd){cur=(prev&&(new Date(d)-new Date(prev))===864e5)?cur+1:1;best=Math.max(best,cur);prev=d;}
  // melhor aderência de um dia
  let bestAdh=0;
  const prof=profFromPatient(pt);
  if(prof.weightKg>0&&pt.foodlog){const m=macros(prof);for(const d of Object.keys(pt.foodlog)){const items=(pt.foodlog[d]||[]).map(e=>({food:FOODS.find(f=>f.n===e.n),g:e.g})).filter(x=>x.food);if(items.length){const c=sumIntake(items);bestAdh=Math.max(bestAdh,adherenceScore({kcal:c.kcal,p:c.p},{kcal:m.kcal,p:m.protein}).ad);}}}
  // maior ganho % de 1RM entre primeira e última sessão de cada exercício
  let strengthGainPct=0;
  for(const k of Object.keys(wl)){const a=wl[k];if(a.length>=2){const f=Math.max(...a[0].sets.map(s=>e1rm(s.l,s.r)||0)),l=Math.max(...a[a.length-1].sets.map(s=>e1rm(s.l,s.r)||0));if(f>0)strengthGainPct=Math.max(strengthGainPct,(l-f)/f*100);}}
  const anamTotal=ANAM_TOTAL||14;
  const anamPct=Math.round(Object.keys(pt.anamnese||{}).length/anamTotal*100);
  return{foodDays,workoutDays:wdays.size,bestStreak:best,bestAdh,weighins:(pt.weighins||[]).length,
    strengthGainPct,measures:(pt.measures||[]).length,labSnapshots:Object.keys(pt.labHistory||{}).length,anamPct};
}
function achievementsFor(pt){const s=gamiState(pt);return ACHIEVEMENTS.map(a=>({...a,done:!!a.when(s)}));}
function xpLevel(xp){let lvl=1,need=100,acc=0;while(xp>=acc+need){acc+=need;lvl++;need=Math.round(need*1.4);}return{lvl,cur:xp-acc,need,pct:Math.round((xp-acc)/need*100)};}

/* registro de treino executado + progressão real (usa 1RM e nextLoad) */
function e1rm(load,reps){if(!(load>0)||!(reps>=1))return null;const ep=reps===1?load:load*(1+reps/30);const br=(reps>=37)?ep:(reps===1?load:load*(36/(37-reps)));return Math.round((ep+br)/2*10)/10;}
function wlogFor(name){const p=pActive();return(p&&p.wlog&&p.wlog[name])||[];}
function logSet(name,r,l,rir){r=Math.round(+r);l=+l;rir=(rir===""||rir==null)?null:+rir;if(!(r>=1)||!(l>0))return;pUpdate(p=>{p.wlog=p.wlog||{};p.wlog[name]=p.wlog[name]||[];const t=todayKey();let s=p.wlog[name].find(x=>x.d===t);if(!s){s={d:t,sets:[]};p.wlog[name].push(s);}s.sets.push({r,l,rir});});render();}
function undoLastSet(name){pUpdate(p=>{if(!p.wlog||!p.wlog[name])return;const t=todayKey(),s=p.wlog[name].find(x=>x.d===t);if(s){s.sets.pop();if(!s.sets.length)p.wlog[name]=p.wlog[name].filter(x=>x!==s);}});render();}
// progressão dupla: topo da faixa com RIR≥1 em 2 sessões → sobe carga
function nextLoadWeb(history,repMax,isCompound){
  if(history.length<2)return{change:"keep",reason:"Registre 2 sessões para calcular a progressão."};
  const t2=history.slice(-2);
  const mastered=t2.every(s=>s.sets.length>0&&s.sets.every(x=>x.r>=repMax&&(x.rir==null||x.rir>=1)));
  if(!mastered)return{change:"keep",reason:`Domine ${repMax} reps com RIR≥1 em 2 sessões seguidas para subir.`};
  const pct=isCompound?2.5:5,cur=t2[1].sets[0].l,next=Math.round(cur*(1+pct/100)*2)/2;
  return{change:"increase",next,pct,reason:`Topo da faixa (${repMax} reps, RIR≥1) batido em 2 sessões.`};
}

function handlePhotoFile(file,pose){
  if(!file||!/^image\//.test(file.type))return;
  const fr=new FileReader();
  fr.onload=()=>{const img=new Image();img.onload=()=>{
    const max=440,scale=Math.min(1,max/Math.max(img.width,img.height));
    const cw=Math.max(1,Math.round(img.width*scale)),chh=Math.max(1,Math.round(img.height*scale));
    const cv=document.createElement("canvas");cv.width=cw;cv.height=chh;
    cv.getContext("2d").drawImage(img,0,0,cw,chh);
    addPhoto(pose,cv.toDataURL("image/jpeg",0.72));

  fr.readAsDataURL(file);

/* score de recuperação a partir de dados reais (sono + FC repouso + carga) */
function recoveryScore(inp){
  const comps=[];
  if(inp.sleepH!=null){let s;if(inp.sleepH>=7.5&&inp.sleepH<=9.5)s=100;else if(inp.sleepH>9.5)s=90;else if(inp.sleepH>=6)s=Math.round(60+(inp.sleepH-6)/1.5*40);else s=Math.max(20,Math.round(inp.sleepH/6*60));comps.push({key:"sleep",label:"Sono",value:s,weight:.4,detail:inp.sleepH+" h"});}
  if(inp.rhrLatest!=null&&inp.rhrBaseline!=null){const dev=inp.rhrLatest-inp.rhrBaseline,s=Math.max(0,Math.min(100,Math.round(100-dev*8)));comps.push({key:"rhr",label:"FC repouso",value:s,weight:.3,detail:(dev>=0?"+":"")+Math.round(dev)+" bpm vs base"});}
  if(inp.daysSinceWorkout!=null){let s=80;if(inp.daysSinceWorkout>=1&&inp.daysSinceWorkout<=2)s=95;else if(inp.daysSinceWorkout===0)s=70;else if(inp.daysSinceWorkout>=4)s=88;if(inp.lastRir!=null&&inp.lastRir<=1)s=Math.max(40,s-25);comps.push({key:"load",label:"Carga/frescor",value:s,weight:.3,detail:inp.daysSinceWorkout+"d desde o treino"});}
  if(!comps.length)return{score:null,components:[]};
  const tw=comps.reduce((a,c)=>a+c.weight,0),score=Math.round(comps.reduce((a,c)=>a+c.value*c.weight,0)/tw);
  return{score,components:comps,zone:score>=75?"alta":score>=50?"moderada":"baixa"};
}
function recoveryInputs(){
  const w=wearableData(),days=Object.keys(w).sort();
  let sleepH=null;for(let i=days.length-1;i>=0;i--)if(w[days[i]].sleep!=null){sleepH=w[days[i]].sleep;break;}
  const rhrs=days.map(d=>w[d].rhr).filter(v=>v!=null);
  const rhrLatest=rhrs.length?rhrs[rhrs.length-1]:null;
  const rhrBaseline=rhrs.length>=2?Math.round(rhrs.slice(0,-1).reduce((s,x)=>s+x,0)/(rhrs.length-1)):null;
  const p=pActive(),wlog=(p&&p.wlog)||{};
  let lastDate=null,lastSets=null;
  for(const k of Object.keys(wlog))for(const se of wlog[k]){if(!lastDate||se.d>lastDate){lastDate=se.d;lastSets=se.sets;}}
  let daysSinceWorkout=null,lastRir=null;
  if(lastDate){daysSinceWorkout=Math.round((new Date(todayKey())-new Date(lastDate))/864e5);const rirs=lastSets.map(s=>s.rir).filter(v=>v!=null);if(rirs.length)lastRir=rirs.reduce((s,x)=>s+x,0)/rirs.length;}
  return{sleepH,rhrLatest,rhrBaseline,daysSinceWorkout,lastRir};
}
function _num(v){if(v==null||v==="")return null;const n=parseFloat(String(v).replace(",","."));return isNaN(n)?null:n;}
function _normDate(s){if(!s)return null;s=String(s).trim().slice(0,10);let m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m)return s;m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);if(m)return m[3]+"-"+m[2]+"-"+m[1];return null;}
function _parseCSV(t){const lines=t.split(/\r?\n/).filter(l=>l.trim());if(lines.length<2)return[];const sep=lines[0].includes(";")?";":",";const hd=lines[0].split(sep).map(h=>h.trim().toLowerCase());return lines.slice(1).map(l=>{const c=l.split(sep);const o={};hd.forEach((h,i)=>o[h]=(c[i]||"").trim());return o;});}
function importWearableText(text){
  const t=(text||"").trim();if(!t){alert("Nada para importar.");return;}
  let rows=[];
  if(t[0]==="["||t[0]==="{"){try{const j=JSON.parse(t);rows=Array.isArray(j)?j:(j.data||j.records||[]);}catch(e){alert("JSON inválido.");return;}}
  else rows=_parseCSV(t);
  if(!rows.length){alert("Nenhuma linha reconhecida. Use CSV com cabeçalho (date,steps,resting_hr,sleep_h,weight_kg) ou JSON.");return;}
  let n=0;
  pUpdate(p=>{
    p.wearable=p.wearable||{};p.weighins=p.weighins||[];p.habits=p.habits||{};
    for(const r of rows){
      const d=_normDate(r.date||r.data||r.dia||r.day);if(!d)continue;
      const steps=_num(r.steps||r.passos),rhr=_num(r.resting_hr||r.rhr||r.fc_repouso||r.fcrepouso||r.restinghr),sleep=_num(r.sleep_h||r.sleep||r.sono||r.sono_h||r.sleephours),wkg=_num(r.weight_kg||r.peso||r.weight);
      const cur=p.wearable[d]||{};
      if(steps!=null)cur.steps=steps;if(rhr!=null)cur.rhr=rhr;if(sleep!=null)cur.sleep=sleep;
      p.wearable[d]=cur;
      if(wkg!=null){const w=p.weighins.find(x=>x.d===d);if(w)w.kg=wkg;else p.weighins.push({d,kg:wkg});}
      if(steps!=null&&steps>=8000){const h=new Set(p.habits[d]||[]);h.add("steps");p.habits[d]=[...h];}
      if(sleep!=null&&sleep>=7){const h=new Set(p.habits[d]||[]);h.add("sleep");p.habits[d]=[...h];}
      n++;
    }
    p.weighins.sort((a,b)=>a.d<b.d?-1:a.d>b.d?1:0);
  });
  render();
  alert(n+" dia(s) importado(s). Passos/sono viraram hábitos; peso entrou na evolução.");
}

// Streak: dias consecutivos (terminando hoje ou ontem) com ≥3 hábitos feitos.
function streak(h){
  let s=0;const d=new Date();
  const done=k=>((h[k]||[]).length)>=3;
  const key=dt=>dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
  if(!done(key(d)))d.setDate(d.getDate()-1); // hoje ainda incompleto não quebra o streak
  while(done(key(d))){s++;d.setDate(d.getDate()-1);}
  return s;
}

// equipment: lista de equipamentos disponíveis; conditions: lesões (filtro).
function workoutPlan(p,equipment,conditions){
  const split=SPLITS[Math.min(Math.max(p.days,1),6)];const gp=GP[p.goal]||GP.maintenance;const sets=3;
  const pool=EX.filter(e=>e.eq.some(x=>equipment.includes(x))&&!e.ctr.some(c=>conditions.includes(c)));
  const usage=new Map();const excluded=[];
  const plan=split.map((dt,i)=>{
    const pats=DAYPAT[dt];const items=[];
    for(const pat of pats){
      const cands=pool.filter(e=>e.mp===pat).sort((a,b)=>b.comp-a.comp||(usage.get(a.c)||0)-(usage.get(b.c)||0)||a.c.localeCompare(b.c));
      if(!cands[0])continue;const e=cands[0];usage.set(e.c,(usage.get(e.c)||0)+1);
      items.push({n:e.n,mu:e.mu,sets,lo:gp.lo,hi:gp.hi,rest:e.comp?gp.rc:gp.ri});
    }
    return{day:i+1,type:DAYNAME[dt],items};
  });
  // exercícios barrados por lesão (para transparência na UI)
  const barred=EX.filter(e=>e.ctr.some(c=>conditions.includes(c))&&e.eq.some(x=>equipment.includes(x)));
  return{plan,barred};
}

/* --- adaptação: série de peso sintética determinística + tendência --- */
function trend(pts){const n=pts.length,sx=pts.reduce((s,p)=>s+p.x,0),sy=pts.reduce((s,p)=>s+p.y,0),sxx=pts.reduce((s,p)=>s+p.x*p.x,0),sxy=pts.reduce((s,p)=>s+p.x*p.y,0);const d=n*sxx-sx*sx;return{slope:(n*sxy-sx*sy)/d,mean:sy/n};}
function weightSeries(p){
  // série determinística derivada do perfil (sem aleatoriedade)
  const start=p.weightKg+ (p.goal==="fat_loss"?2.4:p.goal==="hypertrophy"?-1.2:0);
  const rate=p.goal==="fat_loss"?-0.085:p.goal==="hypertrophy"?0.05:0.004;
  const pts=[];for(let i=0;i<14;i++){const noise=((i*7)%5-2)*0.06;pts.push({x:i,y:R(start+rate*i+noise,1)});}
  return pts;
}

/* adaptação: adesão acumulada + tendência de peso → ajuste de kcal por regra */
function recentAdherence(mKcal,mProt,days){
  const p=pActive();if(!p||!p.foodlog)return null;
  const keys=Object.keys(p.foodlog).sort().slice(-(days||14));const scores=[];
  for(const d of keys){const items=(p.foodlog[d]||[]).map(e=>({food:FOODS.find(f=>f.n===e.n),g:e.g})).filter(x=>x.food);if(!items.length)continue;const c=sumIntake(items);scores.push(adherenceScore({kcal:c.kcal,p:c.p},{kcal:mKcal,p:mProt}).ad);}
  return scores.length?{avg:Math.round(scores.reduce((s,x)=>s+x,0)/scores.length),n:scores.length}:null;
}

  if(st.goal==="fat_loss"&&st.plateau){

    return{delta:-5,act:"Ajuste de platô",why:"Peso estagnou ~14 dias com boa adesão. −5% kcal + 2000 passos/dia (piso 1,1×TMB).",src:"PLATEAU_WEIGHT_14D",sev:"accent"};

/* metas + previsão de data (ETA) por tendência, com faixa de incerteza */
function goalEtaWeb(series,target){
  if(series.length<2)return{reachable:false,reason:"Registre ao menos 2 medições para projetar."};
  const t=trend(series);if(Math.abs(t.slope)<1e-9)return{reachable:false,reason:"Tendência estável — sem previsão.",cur:series[series.length-1].y};
  const cur=series[series.length-1].y,days=(target-cur)/t.slope;
  if(days<0)return{reachable:false,reason:"A tendência atual afasta da meta.",cur};
  return{reachable:true,cur,etaDays:Math.round(days),range:Math.max(7,Math.round(days*.25)),conf:series.length>=14?"média":"baixa",slope:t.slope};
}

function importBackup(text){
  let d;try{d=JSON.parse(text);}catch(e){alert("Arquivo inválido (não é JSON).");return;}
  const incoming=Array.isArray(d)?d:(d.patients||[]);
  if(!incoming.length){alert("Nenhum paciente encontrado no arquivo.");return;}
  const byId={};pAll().forEach(x=>byId[x.id]=x);
  let added=0,replaced=0;
  for(const pp of incoming){if(!pp||!pp.id)continue;if(byId[pp.id])replaced++;else added++;byId[pp.id]=pp;}
  const merged=Object.values(byId);
  try{localStorage.setItem("vita.patients",JSON.stringify(merged));}catch(e){alert("Sem espaço no navegador para importar (backup grande, com fotos?). Remova pacientes antigos primeiro.");return;}
  if(d.active&&byId[d.active])pSetActive(d.active);
  loadProfile();render();
  alert("Backup restaurado: "+added+" novo(s), "+replaced+" atualizado(s).");
}

function ring(pct,size=190){
  const r=size/2-14,c=2*Math.PI*r,off=c*(1-Math.min(pct,1));
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
    <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--accent)"/><stop offset="1" stop-color="var(--accent-2)"/></linearGradient></defs>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--ring-track)" stroke-width="14"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#rg)" stroke-width="14" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg>`;
}
function sparkline(pts){
  const w=100,h=90,pad=6,xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
  const xmin=Math.min(...xs),xmax=Math.max(...xs),ymin=Math.min(...ys),ymax=Math.max(...ys);
  const X=x=>pad+(x-xmin)/(xmax-xmin)*(w-2*pad),Y=y=>h-pad-(y-ymin)/((ymax-ymin)||1)*(h-2*pad);
  const line=pts.map((p,i)=>`${i?"L":"M"}${X(p.x).toFixed(1)} ${Y(p.y).toFixed(1)}`).join(" ");
  const area=`${line} L${X(xmax).toFixed(1)} ${h-pad} L${X(xmin).toFixed(1)} ${h-pad} Z`;
  const last=pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".28"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#sg)"/>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round"/>
    <circle cx="${X(last.x)}" cy="${Y(last.y)}" r="3.2" fill="var(--accent)" vector-effect="non-scaling-stroke"/></svg>`;
}

  // recuperação: score de dados reais (sono/FC/carga); fallback = estimativa por atividade

    <div class="deltarow"><span>Água de hoje: <b>${(wm/1000).toFixed(2)} L</b> · Proteína: <b>${m.protein} g</b> · Passos: meta <b>8 000</b></span></div></div>`;

  const wpr=workoutPlan(p,p.equipment.length?p.equipment:["bodyweight"],p.conditions);
  // periodização: aplica multiplicador de séries do mesociclo (deload na última semana)

  const wp=wpr.plan.map(d=>({...d,items:d.items.map(it=>{const lm=VOL[it.mu]||{mrv:22};const teto=Math.max(1,Math.round(lm.mrv/3));return{...it,sets:Math.max(1,Math.min(Math.round(it.sets*per.setMult),teto)),rir:per.rir};})}));
  const noEquip=p.equipment.length===0;

      panel=`<div class="subs wlogp">
        <div class="subttl">Registrar série — alvo ${it.sets}×${it.lo}–${it.hi} · RIR ${it.rir}</div>

        <div class="logadd" style="margin:10px 0 4px">
          <input class="wnum" data-wl="reps" type="number" placeholder="reps" min="1" aria-label="reps">

      ${a?`<div class="cores"><div class="k">Equivale a</div><div class="v tnum">${Math.round(a.kcal/98*10)/10}<small> bananas</small></div><div class="meta">ou ${(a.kcal/m.kcal*100).toFixed(0)}% do dia</div></div>`:""}</div>`;
  }else{
    const v=vo2maxCooper(+CALC.cooper);

      <div class="calcout"><div class="cores"><div class="k">VO₂máx estimado</div><div class="v tnum">${v}<small> ml/kg/min</small></div><div class="meta">Teste de Cooper 1968 · ±10%</div></div>
      <div class="cores"><div class="k">Classificação</div><div class="v" style="font-size:22px">${cls}</div><div class="meta">para a faixa etária</div></div></div>`;
  }
  const cardCalc=`<div class="card span-8"><h3>Calculadoras</h3><div class="cap">cada resultado com fórmula nomeada e fonte</div>
    <div class="wtabs">${cmodes.map(([k,l])=>`<button data-cmode="${k}" class="${k===CALC.mode?"on":""}">${l}</button>`).join("")}</div>
    ${cbody}</div>`;

  // ---- FOTOS DE EVOLUÇÃO (comparação lado a lado) ----
  const photos=patientPhotos();
  const POSELBL={frente:"Frente",lado:"Lado",costas:"Costas"};
  const byPose=p2=>photos.map((ph,i)=>({...ph,i})).filter(x=>x.pose===p2).sort((a,b)=>a.d<b.d?-1:a.d>b.d?1:a.i-b.i);
  const cmpBlocks=["frente","lado","costas"].map(pz=>{const g=byPose(pz);if(g.length<2)return"";const a=g[0],b=g[g.length-1];
    return`<div class="cmp"><div class="cmphd">${POSELBL[pz]} · ${g.length} fotos</div><div class="cmprow">

  const cardPhotos=`<div class="card span-7"><h3>Fotos de evolução <span class="pill accent">${photos.length}</span></h3><div class="cap">ficam só neste dispositivo — nunca enviadas · reduzidas p/ caber</div>
    <div class="logadd">
      <select id="photopose"><option value="frente">Frente</option><option value="lado">Lado</option><option value="costas">Costas</option></select>

    </div>
    ${photos.length?`<div class="pgal">${photos.map((ph,i)=>`<figure class="pth"><img src="${ph.url}" alt="${ph.pose}"><figcaption>${POSELBL[ph.pose]} · ${ph.d}</figcaption><button class="rmbtn pthrm" data-rmphoto="${i}" aria-label="Remover">✕</button></figure>`).join("")}</div>`:`<div class="src" style="padding:10px 0">Nenhuma foto ainda. Envie a primeira — quando houver 2+ da mesma pose, aparece a comparação antes/depois.</div>`}</div>`;
  const cardCompare=`<div class="card span-5"><h3>Antes × depois</h3><div class="cap">primeira vs última foto de cada pose</div>
    ${cmpBlocks||`<div class="src" style="padding:10px 0">Envie ao menos 2 fotos da mesma pose (ex.: frente) para ver a comparação lado a lado.</div>`}</div>`;

  // ---- WEARABLES: importação + resumo ----
  const wear=wearableData();const wdays=Object.keys(wear).sort();
  const stepsSeries=wdays.slice(-14).map((d,i)=>({x:i,y:wear[d].steps||0})).filter(x=>x.y>0);
  const rhrVals=wdays.map(d=>wear[d].rhr).filter(v=>v!=null);
  const sleepVals=wdays.map(d=>wear[d].sleep).filter(v=>v!=null);
  const stepsVals=wdays.map(d=>wear[d].steps).filter(v=>v!=null);
  const avg=a=>a.length?Math.round(a.reduce((s,x)=>s+x,0)/a.length):null;
  const cardDevices=`<div class="card span-7"><h3>Importar wearable <span class="pill accent">${wdays.length} dias</span></h3><div class="cap">CSV ou JSON de Apple Health / Google Fit / Garmin · processado no seu dispositivo</div>

    <button class="minibtn" id="wearImportPaste" style="margin-top:8px">Importar texto colado</button>
    <div class="src" style="margin-top:10px">Colunas reconhecidas: date · steps · resting_hr · sleep_h · weight_kg. Passos ≥ 8.000 e sono ≥ 7 h marcam os hábitos do dia automaticamente; peso entra na evolução.</div></div>`;
  const cardDevSummary=`<div class="card span-5"><h3>Resumo do período</h3><div class="cap">${wdays.length?wdays[0]+" a "+wdays[wdays.length-1]:"sem dados importados"}</div>

      <div class="tile"><div class="k">Passos · média</div><div class="v tnum">${avg(stepsVals)?avg(stepsVals).toLocaleString('pt-BR'):"—"}</div><div class="meta">${stepsVals.length} dias</div></div>
      <div class="tile"><div class="k">FC repouso</div><div class="v tnum">${avg(rhrVals)??"—"}<small> bpm</small></div><div class="meta">${latestRhr()?"usada nas zonas":"—"}</div></div>
      <div class="tile"><div class="k">Sono · média</div><div class="v tnum">${sleepVals.length?(sleepVals.reduce((s,x)=>s+x,0)/sleepVals.length).toFixed(1):"—"}<small> h</small></div><div class="meta">${sleepVals.length} noites</div></div>
      <div class="tile"><div class="k">Dias sincronizados</div><div class="v tnum">${wdays.length}</div><div class="meta">local, seguro</div></div>

  // ---- PRONTUÁRIO PARA EXPORTAÇÃO (impressão → PDF) ----
  const GOALLBL={fat_loss:"Emagrecimento",hypertrophy:"Hipertrofia",maintenance:"Manutenção / saúde"}[p.goal]||p.goal;
  const lowMic=micros.filter(x=>x.st==="low").map(x=>x.l);
  const okMic=micros.filter(x=>x.st==="ok"||x.st==="high").length;
  const dt=new Date();const dstr=String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0")+"/"+dt.getFullYear();
  const row=(a,b)=>`<tr><td>${a}</td><td>${b}</td></tr>`;
  const reportHtml=`<div class="rep">
    <div class="rephead"><h2>Prontuário — ${_nm}</h2><div>${dstr} · ${GOALLBL} · ${p.sex==="M"?"masc.":"fem."}, ${p.age} anos</div></div>
    <div class="grid2">
    <div><h3>Avaliação corporal</h3><table>
      ${row("Peso",p.weightKg+" kg")}${row("Altura",p.heightCm+" cm")}${row("IMC",bi+" ("+(bi<18.5?"abaixo":bi<25?"normal":bi<30?"sobrepeso":"obesidade")+")")}
      ${row("%Gordura (informado)",p.bf+"%")}${row("RFM (cintura)",(rfmV??"—")+"%")}${row("FFMI",ff??"—")}${row("Massa magra",(p.bf>0?R(p.weightKg*(1-p.bf/100),1):"—")+" kg")}

  // ---- METAS + ETA (previsão de data por tendência) ----
  const goals=patientGoals();

  const wEta=(gW.target&&wSeries.length>=2)?goalEtaWeb(wSeries,+gW.target):null;

  const wProg=(gW.target&&wStart!=null&&wStart!==+gW.target)?Math.max(0,Math.min(100,Math.round((wStart-wCur)/(wStart-(+gW.target))*100))):null;
  // meta de força: escolhe exercício com sessões registradas

  const gL=goals.lift||{};const liftEx=gL.exercise||wlogKeys[0]||"";
  const liftSessions=((_pt&&_pt.wlog&&_pt.wlog[liftEx])||[]).map((se,i)=>({x:i,y:Math.max(...se.sets.map(s=>e1rm(s.l,s.r)||0))}));
  const lEta=(gL.target&&liftSessions.length>=2)?goalEtaWeb(liftSessions,+gL.target):null;
  const lCur=liftSessions.length?liftSessions[liftSessions.length-1].y:null;

  const etaLine=(eta,deadline)=>{
    if(!eta)return `<div class="src">Defina a meta e registre ≥2 medições para a previsão.</div>`;

    const dl=deadline?new Date(deadline+"T00:00:00"):null;const etaMs=Date.now()+eta.etaDays*864e5;
    const onTrack=dl?etaMs<=dl.getTime():null;
    return `<div class="cores" style="margin-top:10px"><div class="k">Previsão</div><div class="v tnum" style="font-size:22px">${addDaysStr(eta.etaDays)}</div><div class="meta">± ${eta.range} dias · confiança ${eta.conf}${dl?` · <span style="color:${onTrack?'var(--good)':'var(--crit)'}">${onTrack?'dentro do prazo':'após o prazo'}</span>`:""}</div></div>`;
  };
  const cardGoals=`<div class="card span-7"><h3>Metas & previsão</h3><div class="cap">projeção por tendência (regressão) com faixa de incerteza · não é promessa</div>

    ${gW.target?`<div class="trendhead" style="margin-top:6px"><div><div class="now tnum" style="font-size:26px">${wCur??"—"}<small> kg</small></div><div class="src">meta ${gW.target} kg · atual ${wCur??"—"}</div></div><div style="flex:1;min-width:140px">${wProg!=null?`<div class="track"><div class="fill" style="width:${wProg}%;background:var(--accent)"></div></div><div class="src" style="margin-top:5px">${wProg}% do caminho</div>`:""}</div></div>${etaLine(wEta,gW.deadline)}`:`<div class="src">Sem meta de peso definida.</div>`}
    <div class="daytag" style="margin-top:18px">Força · 1RM estimado</div>
    ${wlogKeys.length?`<div class="logadd"><select class="wnum" style="width:auto;min-width:160px" data-goal="lift.exercise">${wlogKeys.map(k=>`<option value="${k}" ${k===liftEx?"selected":""}>${k}</option>`).join("")}</select><input class="wnum" style="width:110px" type="number" step="0.5" data-goal="lift.target" value="${gL.target||""}" placeholder="alvo kg"><input class="wnum" style="width:150px" type="date" data-goal="lift.deadline" value="${gL.deadline||""}">${gL.target?`<button class="minibtn" data-cleargoal="lift">limpar</button>`:""}</div>
    ${gL.target?`<div class="src" style="margin-top:6px">${liftEx}: atual ~<b>${lCur??"—"} kg</b> · meta ${gL.target} kg</div>${etaLine(lEta,gL.deadline)}`:`<div class="src">Defina alvo de 1RM para o exercício.</div>`}`:`<div class="src">Registre séries em Treino para habilitar metas de força.</div>`}</div>`;
  const cardGoalsHelp=`<div class="card span-5"><h3>Como a previsão funciona</h3><div class="cap">honesta sobre incerteza</div>
    <div class="src" style="font-size:12.5px;line-height:1.6">A data sai da <b>regressão linear</b> sobre suas medições reais, não de um dia isolado. A faixa <b>± dias</b> é a incerteza — quanto mais dados, mais estreita (confiança sobe para média com 14+ pontos).<br><br>Se a tendência atual <b>afasta</b> da meta, o sistema diz isso em vez de inventar uma data. Metas são projeção, não promessa — o ritmo muda com adesão, sono e treino.<br><br>Ritmo seguro: <b>0,25–1%</b> do peso/semana (Garthe 2011).</div></div>`;

  // ---- MEDIDAS CORPORAIS (circunferências + dobras JP3) ----
  const meas=patientMeasures();
  const sfLabels=SF_SITES[p.sex]||SF_SITES.M;
  const CIRC=[["waist","Cintura"],["arm","Braço"],["thigh","Coxa"],["hip","Quadril"]];
  const lastM=meas.length?meas[meas.length-1]:null;
  const firstM=meas.length?meas[0]:null;
  const delta=(k)=>{if(!firstM||!lastM||firstM[k]==null||lastM[k]==null||meas.length<2)return null;return R(lastM[k]-firstM[k],1);};
  const cardMeasures=`<div class="card span-7"><h3>Medidas corporais <span class="pill accent">${meas.length}</span></h3><div class="cap">circunferências (cm) + dobras (mm) · %gordura por Jackson-Pollock 3 (sexo ${p.sex})</div>
    <div class="mgrid">

    </div>

    ${meas.length?`<div class="list" style="margin-top:12px">${meas.slice().reverse().map((mm,ri)=>{const i=meas.length-1-ri;return`<div class="li"><span class="idx tnum">${mm.d.slice(5)}</span><div class="nm"><b>${mm.bf!=null?mm.bf+"% gordura (JP3)":"circunferências"}</b><span>${CIRC.filter(([k])=>mm[k]!=null).map(([k,l])=>l.slice(0,3)+" "+mm[k]).join(" · ")||"—"}</span></div><div class="rt"></div><button class="rmbtn" data-rmmeas="${i}" aria-label="Remover">✕</button></div>`;}).join("")}</div>`:`<div class="src" style="margin-top:10px">Nenhuma medição. Preencha o que tiver (nem tudo é obrigatório) e registre.</div>`}</div>`;
  const cardMeasEvo=`<div class="card span-5"><h3>Evolução das medidas</h3><div class="cap">${meas.length>=2?firstM.d+" → "+lastM.d:"registre 2+ medições"}</div>
    ${meas.length>=2?`<div class="tiles">${CIRC.map(([k,l])=>{const d=delta(k);return`<div class="tile"><div class="k">${l}</div><div class="v tnum">${lastM[k]??"—"}<small> cm</small></div><div class="meta">${d!=null?(d>0?"+":"")+d+" cm":"—"}</div></div>`;}).join("")}
      <div class="tile"><div class="k">%Gordura JP3</div><div class="v tnum">${lastM.bf??"—"}<small> %</small></div><div class="meta">${meas.length>=2&&firstM.bf!=null&&lastM.bf!=null?((lastM.bf-firstM.bf>0?"+":"")+R(lastM.bf-firstM.bf,1)+" pp"):"—"}</div></div>

  // ---- PAINEL DO PROFISSIONAL (roster de pacientes) ----
  const roster=pAll().map(patientStatus).sort((a,b)=>b.attention-a.attention||a.name.localeCompare(b.name));
  const activeId=pActiveId();

  const cardRoster=`<div class="card span-12"><h3>Pacientes <span class="pill ${needAtt?"warn":"good"}">${roster.length} · ${needAtt} precisam de atenção</span></h3><div class="cap">ordenado por prioridade · toque para abrir o paciente</div>
