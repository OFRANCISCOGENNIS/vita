        <span>${r.rf>0?`<span class="pill crit">${r.rf} bandeira${r.rf>1?"s":""}</span>`:r.daysSince!=null&&r.daysSince>=7?`<span class="pill warn">inativo</span>`:`<span class="pill good">ok</span>`}</span>
      </div>`).join("")}
    </div>
    <div class="src" style="margin-top:12px">Prioridade: bandeiras de segurança &gt; inatividade &gt; baixa aderência. Aderência e alertas vêm do diário, pesagens e anamnese de cada paciente.</div></div>`;
  // notas de acompanhamento do paciente ativo (notes já computado no topo do render)
  const cardNotes=`<div class="card span-12"><h3>Notas de acompanhamento · ${_nm} <span class="pill accent">${notes.length}</span></h3><div class="cap">observações da consulta · datadas · entram no prontuário PDF</div>
    <div class="logadd"><textarea id="noteText" placeholder="Ex.: relatou dor no ombro no supino; ajustar para halteres. Sono melhorou após rotina noturna." style="flex:1;min-width:220px;min-height:56px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px;font-size:13.5px;resize:vertical"></textarea><button class="minibtn" id="addNote" style="align-self:flex-start">+ Nota</button></div>
    ${notes.length?`<div class="list" style="margin-top:12px">${notes.slice().reverse().map(n=>`<div class="li"><span class="idx tnum">${n.d.slice(5)}</span><div class="nm" style="white-space:normal"><b style="font-weight:500;white-space:normal">${n.text.replace(/</g,"&lt;")}</b></div><button class="rmbtn" data-rmnote="${n.ts}" aria-label="Remover">✕</button></div>`).join("")}</div>`:`<div class="src" style="margin-top:10px">Sem notas ainda.</div>`}</div>`;

  // ---- AGENDA DO DIA (cronograma por horário) ----
  const evs=[];
  if(!dietBlocked)plan.forEach(ms=>evs.push({t:ms.t,ic:"🍽️",tt:ms.s,dt:`${ms.kcal} kcal · ${ms.p} g proteína${ms.items.length?" · "+ms.items.map(i=>i.n).join(", "):""}`}));
  // hidratação: distribui a meta em 5 tomadas fora dos picos de refeição
  const wslots=["09:00","11:00","15:00","17:00","21:00"];const doseMl=Math.round(wm/wslots.length/50)*50;
  wslots.forEach(t=>evs.push({t,ic:"💧",tt:"Água",dt:`~${doseMl} ml (meta ${(wm/1000).toFixed(2)} L/dia)`}));
  // janela de treino + pós-treino (proteína)
  const trainDay=wp[0];
  if(p.days>0&&trainDay){evs.push({t:"18:00",ic:"🏋️",tt:"Janela de treino",dt:`${trainDay.type} · ${trainDay.items.length} exercícios · ${isDeload?"deload":"acúmulo"}`});
    evs.push({t:"19:00",ic:"🥤",tt:"Pós-treino",dt:`Proteína aqui apoia a síntese — ~${Math.round(.4*p.weightKg)} g (0,4 g/kg, Schoenfeld & Aragon)`});}
  evs.sort((a,b)=>a.t<b.t?-1:a.t>b.t?1:0);
  const nowH=new Date().getHours();
  const cardAgenda=`<div class="card span-8"><h3>Agenda de hoje · ${WEEK_DAYS[todayIdx]}</h3><div class="cap">cronograma de refeições, hidratação e treino · horários do plano</div>
    <div class="tl">${evs.map(ev=>{const eh=+ev.t.slice(0,2);const past=eh<nowH;return`<div class="tlrow ${past?'past':''}"><span class="tlt tnum">${ev.t}</span><span class="tlic">${ev.ic}</span><div class="tlc"><b>${ev.tt}</b><span>${ev.dt}</span></div></div>`;}).join("")}</div>
    <div class="src" style="margin-top:12px">Ajuste os horários à sua rotina — o que importa é a distribuição (proteína a cada 3–4 h, água ao longo do dia).</div></div>`;
  const cardAgendaSum=`<div class="card span-4"><h3>Resumo do dia</h3><div class="cap">metas de hoje</div>
    <div class="tiles">
      <div class="tile"><div class="k">Calorias</div><div class="v tnum">${m.kcal}</div><div class="meta">alvo</div></div>
      <div class="tile"><div class="k">Proteína</div><div class="v tnum">${m.protein}<small> g</small></div><div class="meta">${Math.round(.4*p.weightKg)} g/refeição</div></div>
      <div class="tile"><div class="k">Água</div><div class="v tnum">${(wm/1000).toFixed(2)}<small> L</small></div><div class="meta">${wslots.length} tomadas</div></div>
      <div class="tile"><div class="k">Refeições</div><div class="v tnum">${plan.length}</div><div class="meta">a cada 3–4 h</div></div>
    </div>
    <div class="src" style="margin-top:12px">Marque os hábitos do dia na aba Hábitos — a sequência conta com 3+ concluídos.</div></div>`;

  // ---- CHECK-IN SEMANAL AUTOMÁTICO ----
  const today0=todayKey(),d7=dateStrAgo(6),d8=dateStrAgo(7),d14=dateStrAgo(13);
  const wiAll=(_pt&&_pt.weighins)||[];
  const wThis=avgInWindow(wiAll,x=>x.d,x=>x.kg,d7,today0);
  const wPrev=avgInWindow(wiAll,x=>x.d,x=>x.kg,d14,d8);
  const wDeltaWk=(wThis!=null&&wPrev!=null)?R(wThis-wPrev,2):null;
  const flAll=(_pt&&_pt.foodlog)||{};
  const adhWk=(()=>{const sc=[];Object.keys(flAll).forEach(d=>{if(d>=d7&&d<=today0){const items=(flAll[d]||[]).map(e=>({food:FOODS.find(f=>f.n===e.n),g:e.g})).filter(x=>x.food);if(items.length){const c=sumIntake(items);sc.push(adherenceScore({kcal:c.kcal,p:c.p},{kcal:m.kcal,p:m.protein}).ad);}}});return sc.length?Math.round(sc.reduce((a,x)=>a+x,0)/sc.length):null;})();
  const wlogAll=(_pt&&_pt.wlog)||{};const sessDates=new Set();Object.values(wlogAll).forEach(a=>a.forEach(s=>{if(s.d>=d7&&s.d<=today0)sessDates.add(s.d);}));
  const workoutsWk=sessDates.size;
  CHECKIN_TEXT=`📋 Check-in semanal — ${_nm} (${dstr})\n`
    +`Peso: ${wThis!=null?R(wThis,1)+" kg":"sem pesagem"}${wDeltaWk!=null?` (${wDeltaWk>0?"+":""}${wDeltaWk} kg vs semana anterior)`:""}\n`
    +`Aderência (diário): ${adhWk!=null?adhWk+"%":"—"}\n`
    +`Treinos registrados: ${workoutsWk}/${p.days}\n`
    +`Sequência de hábitos: ${st2} dias\n`
    +`Ação recomendada: ${adapt.act} — ${adapt.why}`;
  const cardCheckin=`<div class="card span-12"><h3>Check-in da semana <span class="pill accent">${dstr}</span> <button class="minibtn" id="copyCheckin">⧉ Copiar resumo</button></h3><div class="cap">últimos 7 dias vs semana anterior · pronto para enviar ao paciente</div>
    <div class="tiles" style="grid-template-columns:repeat(auto-fill,minmax(150px,1fr))">
      <div class="tile"><div class="k">Peso médio</div><div class="v tnum">${wThis!=null?R(wThis,1):"—"}<small> kg</small></div><div class="meta" style="color:${wDeltaWk==null?"var(--muted)":(p.goal==="hypertrophy"?wDeltaWk>0:wDeltaWk<0)?"var(--good)":"var(--accent)"}">${wDeltaWk!=null?(wDeltaWk>0?"+":"")+wDeltaWk+" kg vs anterior":"1 semana p/ comparar"}</div></div>
      <div class="tile"><div class="k">Aderência</div><div class="v tnum" style="color:${adhWk==null?"var(--muted)":adhWk>=75?"var(--good)":adhWk>=60?"var(--warn)":"var(--crit)"}">${adhWk!=null?adhWk+"%":"—"}</div><div class="meta">diário da semana</div></div>
      <div class="tile"><div class="k">Treinos</div><div class="v tnum">${workoutsWk}<small>/${p.days}</small></div><div class="meta">registrados</div></div>
      <div class="tile"><div class="k">Sequência</div><div class="v tnum">${st2}</div><div class="meta">dias de hábitos</div></div>
    </div>
    <div class="src" style="margin-top:12px">Ação recomendada: <b>${adapt.act}</b> — ${adapt.why}</div></div>`;

  // ---- EVOLUÇÃO CONSOLIDADA (timeline multi-métrica de dados reais) ----
  const evoPanel=(label,series,unit,dir)=>{
    if(series.length<2)return `<div class="evop"><div class="evohd"><span class="evol">${label}</span></div><div class="src" style="padding:16px 0;text-align:center">Registre 2+ pontos</div></div>`;
    const s2=series.map((pt,i)=>({x:i,y:pt.y}));const cur=s2[s2.length-1].y,first=s2[0].y,d=R(cur-first,1);
    let col="var(--muted)";
    if(dir==="down")col=d<0?"var(--good)":d>0?"var(--accent)":"var(--muted)";
    else if(dir==="up")col=d>0?"var(--good)":d<0?"var(--accent)":"var(--muted)";
    return `<div class="evop"><div class="evohd"><span class="evol">${label}</span><span class="evocur tnum">${cur}<small>${unit}</small></span></div>${sparkline(s2)}<div class="evod tnum" style="color:${col}">${d>0?"+":""}${d}${unit} · ${s2.length} pts</div></div>`;
  };
  const wSeriesE=((_pt&&_pt.weighins)||[]).map((w,i)=>({x:i,y:w.kg}));
  const measE=(_pt&&_pt.measures)||[];
  const bfSeriesE=measE.filter(x=>x.bf!=null).map((x,i)=>({x:i,y:x.bf}));
  const waistSeriesE=measE.filter(x=>x.waist!=null).map((x,i)=>({x:i,y:x.waist}));
  const wlogE=(_pt&&_pt.wlog)||{};
  const topLiftsE=Object.keys(wlogE).filter(k=>(wlogE[k]||[]).length>=2).sort((a,b)=>wlogE[b].length-wlogE[a].length).slice(0,2);
  const liftSeriesE=topLiftsE.map(k=>({name:k,series:wlogE[k].map((se,i)=>({x:i,y:Math.max(...se.sets.map(s=>e1rm(s.l,s.r)||0))}))}));
  const flE=(_pt&&_pt.foodlog)||{};
  const adhSeriesE=Object.keys(flE).sort().map(d=>{const items=(flE[d]||[]).map(e=>({food:FOODS.find(f=>f.n===e.n),g:e.g})).filter(x=>x.food);if(!items.length)return null;const c=sumIntake(items);return adherenceScore({kcal:c.kcal,p:c.p},{kcal:m.kcal,p:m.protein}).ad;}).filter(v=>v!=null).map((y,i)=>({x:i,y}));
  const anyEvo=wSeriesE.length>=2||bfSeriesE.length>=2||waistSeriesE.length>=2||liftSeriesE.some(l=>l.series.length>=2)||adhSeriesE.length>=2;
  const cardEvolution=`<div class="card span-12"><h3>Evolução consolidada</h3><div class="cap">todas as métricas do paciente numa linha do tempo · só dados reais registrados</div>
    ${anyEvo?`<div class="evogrid">
      ${evoPanel("Peso",wSeriesE," kg",p.goal==="hypertrophy"?"up":"down")}
      ${evoPanel("%Gordura (JP3)",bfSeriesE," %","down")}
      ${evoPanel("Cintura",waistSeriesE," cm","down")}
      ${liftSeriesE.map(l=>evoPanel(l.name+" · 1RM",l.series," kg","up")).join("")}
      ${evoPanel("Aderência",adhSeriesE," %","up")}
    </div>
    <div class="src" style="margin-top:12px"><span style="color:var(--good)">Verde</span> = na direção do objetivo. Cada painel precisa de 2+ registros (pesagens, medições, séries de treino, diário).</div>`:`<div class="src" style="padding:20px 0;text-align:center">Sem histórico ainda. Registre pesagens (Hoje), medições (Metas), séries (Treino) e o diário — a evolução aparece aqui automaticamente.</div>`}</div>`;

  // ---- ANAMNESE GUIADA ----
  const an=anamnese();
  const anAnswered=Object.keys(an).filter(k=>{const v=an[k];return !(v===null||v===""||(Array.isArray(v)&&!v.length));}).length;
  const anFlags=[];
  if(an.chest_pain)anFlags.push("Dor torácica");
  if(an.pregnancy)anFlags.push("Gestação/lactação");
  if(an.t1_diabetes)anFlags.push("Diabetes tipo 1");
  if([an.extreme_restriction,an.compensatory,an.body_image].filter(Boolean).length>=2)anFlags.push("Sinais de transtorno alimentar");
  const cardAnam=`<div class="card span-8"><h3>Anamnese guiada <span class="pill ${anFlags.length?"crit":anAnswered>=ANAM_TOTAL*0.7?"good":"accent"}">${anAnswered}/${ANAM_TOTAL} respondidas</span></h3><div class="cap">preenche condições e dispara bandeiras de segurança · por paciente</div>
    ${anFlags.length?`<div class="banner crit" style="margin:0 0 14px"><span class="ic">⛔</span><div><b>Bandeiras ativas: ${anFlags.join(", ")}</b><div class="msg">A recomendação padrão é pausada. Veja a aba Segurança e procure um profissional habilitado.</div></div></div>`:""}
    ${ANAMNESE.map(g=>`<div class="anamsec"><div class="anamsec-t">${g.sec}</div>${g.qs.map(q=>anamRow(q,an)).join("")}</div>`).join("")}
    <div class="src" style="margin-top:12px">Respostas alimentam guardrails, filtros de dieta/treino (ex.: DM1 bloqueia keto) e o prontuário.</div></div>`;
  const cardAnamHelp=`<div class="card span-4"><h3>Por que responder</h3><div class="cap">segurança determinística</div>
    <div class="src" style="font-size:12.5px;line-height:1.6">Cada resposta é uma regra codificada:<br>• <b>Dor torácica / gestação / DM1</b> → pausa a recomendação padrão.<br>• <b>2+ sinais alimentares</b> → orienta cuidado especializado.<br>• <b>Lesões</b> → filtram exercícios no treino.<br>• <b>DM1</b> → bloqueia dieta cetogênica.<br>• <b>Experiência</b> → ajusta a dificuldade dos exercícios.<br><br>Nada é diagnóstico — o sistema <b>educa, não diagnostica</b>.</div></div>`;

  const VIEWS={
    today:{title:"Hoje",sub:"Tudo abaixo é calculado por fórmula nomeada — mesmo input, mesmo output.",html:cardCoach+cardEnergy+cardMacros+cardBody+cardTrend+cardAdapt+cardReady+cardWater+cardMeals+cardWorkoutMain},
    nutri:{title:"Nutrição",sub:"Meta calórica e macros pelo motor; plano montado por seleção na base de alimentos.",html:cardEnergy+cardMacros+cardMeals+cardBody},
    week:{title:"Semana",sub:"7 dias com rotação determinística de fontes + lista de compras agregada.",html:cardWeek+cardShop},
    diario:{title:"Diário alimentar",sub:"Registre o consumo real; a Análise passa a usar o que foi comido, não o plano.",html:cardDiary+cardIntake},
    analise:{title:"Análise de precisão",sub:"Micronutrientes vs DRI, qualidade proteica (PDCAAS), leucina por refeição, carga glicêmica e lacunas com fontes alimentares.",html:cardMicros+cardProtQual+cardProtDist+cardGL+cardSupp+cardMacros},
    train:{title:"Treino",sub:"Split por frequência, volume graduado por landmarks, base aeróbica e biblioteca de exercícios.",html:cardWorkoutMain+cardVolume+cardZone2+cardExLib+cardReady+cardTrend},
    calc:{title:"Calculadoras",sub:"1RM, zonas de FC, pace, gasto calórico e VO₂máx — todas determinísticas.",html:cardCalc+cardBody},
    labs:{title:"Exames",sub:"Comparação com faixas de referência + tendência entre exames — educativo, nunca prescreve.",html:cardLabs+cardLabSummary+cardLabTrend},
    habits:{title:"Hábitos",sub:"Checklist diário, sequência, conquistas e nível — tudo por regras determinísticas.",html:cardHabits+cardWater+cardStreak+cardGami+cardCoach},
    pacientes:{title:"Pacientes",sub:"Visão do profissional: todos os pacientes, quem precisa de atenção primeiro.",html:cardRoster+cardNotes},
    agenda:{title:"Agenda do dia",sub:"Cronograma de refeições, hidratação e treino por horário — ajuste à sua rotina.",html:cardAgenda+cardAgendaSum},
    evolucao:{title:"Evolução",sub:"Check-in semanal + linha do tempo de todas as métricas num só lugar.",html:cardCheckin+cardEvolution},
    metas:{title:"Metas & medidas",sub:"Alvos com previsão de data + circunferências e dobras com %gordura por Jackson-Pollock.",html:cardGoals+cardGoalsHelp+cardMeasures+cardMeasEvo},
    fotos:{title:"Fotos de evolução",sub:"Registro visual do progresso, comparação antes/depois. Tudo local — as imagens não saem do dispositivo.",html:cardPhotos+cardCompare},
    devices:{title:"Dispositivos",sub:"Importe passos, FC de repouso, sono e peso de wearables — alimenta hábitos, evolução e zonas de FC.",html:cardDevices+cardDevSummary},
    anamnese:{title:"Anamnese guiada",sub:"Questionário progressivo que preenche condições e dispara bandeiras de segurança em tempo real.",html:cardAnam+cardAnamHelp},
    safe:{title:"Segurança",sub:"Guardrails determinísticos. Educa, não diagnostica.",html:(guards.length?"":`<div class="card span-12"><h3>Nenhuma bandeira vermelha ativa <span class="pill good">tudo certo</span></h3><div class="cap">o motor libera as recomendações padrão</div><div class="src" style="font-size:12px">Regras monitoradas: dor torácica ao esforço · IMC &lt;17,5 com meta de emagrecer · indícios de transtorno alimentar · gestação/lactação · diabetes tipo 1 · menor de 16 sem responsável · exame em faixa crítica · piso calórico 1,1×TMB · freio de perda &gt;1,5%/semana.</div></div>`)+cardTrend+cardBody},
  };
  const v=VIEWS[VIEW];
  $("#viewtitle").textContent=v.title;$("#viewsub").textContent=v.sub;
  $("#views").className="grid";$("#views").innerHTML=v.html;
  saveProfile(); // persiste perfil + anamnese + exames a cada mudança
  // mantém o seletor de pacientes do header em dia (nome ao vivo)
  const sel=$("#patientsel");if(sel)sel.innerHTML=pAll().map(x=>`<option value="${x.id}" ${x.id===pActiveId()?"selected":""}>${x.name}</option>`).join("");
}

/* interações */
document.querySelectorAll(".profile input,.profile select").forEach(el=>el.addEventListener("input",render));
// delegação nas views: abas da semana, exames e hábitos (o DOM é re-renderizado)
$("#views").addEventListener("click",e=>{
  const w=e.target.closest("[data-w]");if(w){WEEKSEL=+w.dataset.w;render();return;}
  const h=e.target.closest(".hab");if(h){toggleHabit(h.dataset.h);return;}
  if(e.target.closest("#exportShop")){printMode("print-shop");return;}
  if(e.target.closest("#logMeas")){logMeasurement();return;}
  if(e.target.closest("#addlog")){addLogItem($("#logfood").value,+$("#loggrams").value);return;}
  const rm=e.target.closest("[data-rmlog]");if(rm){removeLogItem(+rm.dataset.rmlog);return;}
  if(e.target.closest("#mesoPrev")){setMesoWeek(-1);return;}
  if(e.target.closest("#mesoNext")){setMesoWeek(1);return;}
  const rmp=e.target.closest("[data-rmphoto]");if(rmp){removePhoto(+rmp.dataset.rmphoto);return;}
  if(e.target.closest("#wearTemplate")){downloadWearableTemplate();return;}
  if(e.target.closest("#wearImportPaste")){const ta=$("#wearpaste");if(ta)importWearableText(ta.value);return;}
  const ls=e.target.closest("[data-logset]");if(ls){const g=k=>{const el=document.querySelector('[data-wl="'+k+'"]');return el?el.value:"";};logSet(ls.dataset.logset,g("reps"),g("load"),g("rir"));return;}
  const us=e.target.closest("[data-undoset]");if(us){undoLastSet(us.dataset.undoset);return;}
  const wl=e.target.closest("[data-wlog]");if(wl){WLOG=WLOG===wl.dataset.wlog?null:wl.dataset.wlog;render();return;}
  const ss=e.target.closest("[data-startsess]");if(ss){SESH={day:+ss.dataset.startsess,ex:0,restUntil:null,started:Date.now()};render();return;}
  if(e.target.closest("#sessEnd")){SESH=null;render();return;}
  if(e.target.closest("#sessSkipRest")){if(SESH)SESH.restUntil=null;render();return;}
  if(e.target.closest("#sessPrev")){if(SESH&&SESH.ex>0){SESH.ex--;SESH.restUntil=null;render();}return;}
  if(e.target.closest("#sessNext")){
    if(SESH&&LASTWP&&LASTWP[SESH.day]){
      if(SESH.ex>=LASTWP[SESH.day].items.length-1){SESH=null;alert("Sessão concluída — séries salvas no histórico. 💪");}
      else{SESH.ex++;SESH.restUntil=null;}
      render();
    }return;}
  if(e.target.closest("#sessLog")){
    if(SESH&&LASTWP&&LASTWP[SESH.day]){
      const cur=LASTWP[SESH.day].items[Math.min(SESH.ex,LASTWP[SESH.day].items.length-1)];
      const g=k=>{const el=document.querySelector('[data-swl="'+k+'"]');return el?el.value:"";};
      const r=+g("reps"),l=+g("load");
      if(!(r>=1)||!(l>0)){alert("Preencha reps e carga.");return;}
      SESH.restUntil=Date.now()+cur.rest*1000;
      logSet(cur.n,r,l,g("rir")); // logSet re-renderiza; restUntil já está setado
    }return;}
  const xf=e.target.closest("[data-exfilter]");if(xf){EXFILTER=xf.dataset.exfilter;render();return;}
  const xo=e.target.closest("[data-exopen]");if(xo){EXOPEN=EXOPEN===xo.dataset.exopen?null:xo.dataset.exopen;render();return;}
  const wt=e.target.closest("[data-water]");if(wt){addWater(+wt.dataset.water,waterMl(P()));return;}
  const aa=e.target.closest("[data-applyadapt]");if(aa){applyAdapt(+aa.dataset.applyadapt,aa.dataset.adaptsrc);return;}
  if(e.target.closest("#resetAdapt")){resetAdapt();return;}
  const ab=e.target.closest("[data-anambool]");if(ab){setAnam(ab.dataset.anambool,ab.dataset.v==="1");return;}
  const am=e.target.closest("[data-anammulti]");if(am){toggleAnamMulti(am.dataset.anammulti,am.dataset.v);return;}
  const ac=e.target.closest("[data-anamchoice]");if(ac){setAnam(ac.dataset.anamchoice,anamnese()[ac.dataset.anamchoice]===ac.dataset.v?null:ac.dataset.v);return;}
  const cg=e.target.closest("[data-cleargoal]");if(cg){clearGoal(cg.dataset.cleargoal);return;}
  if(e.target.closest("#addMeas")){
    const g=k=>{const el=document.querySelector('[data-meas="'+k+'"]');const v=el&&el.value!==""?+el.value:null;return v;};
    const entry={d:todayKey()};["waist","arm","thigh","hip"].forEach(k=>{const v=g(k);if(v!=null)entry[k]=v;});
    const sf=[g("sf0"),g("sf1"),g("sf2")];
    if(sf.every(x=>x!=null&&x>0)){entry.sf=sf;entry.bf=bodyFatJP3(P().sex,P().age,sf[0]+sf[1]+sf[2]);}
    if(Object.keys(entry).length<=1){alert("Preencha ao menos uma medida.");return;}
    addMeasure(entry);return;
  }
  const rmm=e.target.closest("[data-rmmeas]");if(rmm){removeMeasure(+rmm.dataset.rmmeas);return;}
  if(e.target.closest("#labSnapshot")){saveLabSnapshot();return;}
  if(e.target.closest("#addNote")){const ta=$("#noteText");if(ta){addNote(ta.value);}return;}
  const rmn=e.target.closest("[data-rmnote]");if(rmn){removeNote(+rmn.dataset.rmnote);return;}
  const opt=e.target.closest("[data-openpt]");if(opt){pSetActive(opt.dataset.openpt);loadProfile();VIEW="today";$("#nav").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.v==="today"));render();return;}
  if(e.target.closest("#copyCheckin")){const txt=CHECKIN_TEXT;const done=()=>alert("Resumo copiado — cole no WhatsApp/e-mail do paciente.");if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(()=>alert(txt));}else alert(txt);return;}
  const cm=e.target.closest("[data-cmode]");if(cm){CALC.mode=cm.dataset.cmode;render();return;}
  const sw=e.target.closest("[data-swap]");if(sw){SWAP=SWAP===sw.dataset.swap?null:sw.dataset.swap;render();return;}
});
// troca de paciente + novo paciente + exportar prontuário
$("#patientsel").addEventListener("change",e=>{pSetActive(e.target.value);loadProfile();render();});
$("#addpatient").addEventListener("click",()=>{pAdd();loadProfile();render();});
$("#exportPdf").addEventListener("click",()=>printMode("print-report"));
$("#backupBtn").addEventListener("click",exportBackup);
$("#restoreFile").addEventListener("change",e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const fr=new FileReader();fr.onload=()=>importBackup(fr.result);fr.readAsText(f);e.target.value="";});
function printMode(cls){document.body.classList.add(cls);window.print();setTimeout(()=>document.body.classList.remove(cls),400);}
if(window.matchMedia)window.matchMedia("print").addEventListener&&window.matchMedia("print").addEventListener("change",ev=>{if(!ev.matches)document.body.classList.remove("print-shop","print-report");});
// inputs/selects das calculadoras — 'change' (não 'input') p/ não perder foco no re-render
$("#views").addEventListener("change",e=>{
  const c=e.target.closest("[data-calc]");if(c){CALC[c.dataset.calc]=c.value;render();return;}
  const anum=e.target.closest("[data-anamnum]");if(anum){setAnam(anum.dataset.anamnum,anum.value===""?null:+anum.value);return;}
  const gl=e.target.closest("[data-goal]");if(gl){const[kind,field]=gl.dataset.goal.split(".");const isNum=(field==="target");setGoal(kind,{[field]:gl.value===""?undefined:(isNum?+gl.value:gl.value)});return;}
  const bd=e.target.closest("[data-budget]");if(bd){pUpdate(p=>{p.dailyBudget=bd.value===""?undefined:+bd.value;});render();return;}
  const pf=e.target.closest("#photofile");if(pf&&pf.files&&pf.files[0]){handlePhotoFile(pf.files[0],($("#photopose")||{value:"frente"}).value);pf.value="";return;}
  const wf=e.target.closest("#wearfile");if(wf&&wf.files&&wf.files[0]){const fr=new FileReader();fr.onload=()=>importWearableText(fr.result);fr.readAsText(wf.files[0]);wf.value="";}
});
// chips multi-seleção da anamnese
$("#anamnese").addEventListener("click",e=>{const b=e.target.closest(".chips[data-multi] button");if(!b)return;b.classList.toggle("on");render();});
// teclado: Enter/Espaço ativa qualquer elemento interativo com role="button"
$("#views").addEventListener("keydown",e=>{
  if(e.key!=="Enter"&&e.key!==" ")return;
  const b=e.target.closest('[role="button"]');
  if(b){e.preventDefault();b.click();}
});
$("#views").addEventListener("change",e=>{
  const l=e.target.closest("[data-lab]");if(l){LABVALS[l.dataset.lab]=l.value;render();}
});
function toggleHabit(k){
  const h=loadHab(),t=todayKey();const day=new Set(h[t]||[]);
  day.has(k)?day.delete(k):day.add(k);
  h[t]=[...day];saveHab(h);render();
}
$("#sexseg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;$("#sexseg").querySelectorAll("button").forEach(x=>x.classList.remove("on"));b.classList.add("on");render();});
$("#nav").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;$("#nav").querySelectorAll("button").forEach(x=>x.classList.remove("on"));b.classList.add("on");VIEW=b.dataset.v;render();});

/* tema */
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);$("#themeic").textContent=t==="dark"?"☾":"☀";$("#themetx").textContent=t==="dark"?"Escuro":"Claro";}
let theme=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";applyTheme(theme);
$("#theme").addEventListener("click",()=>{theme=theme==="dark"?"light":"dark";applyTheme(theme);});

pEnsure();     // garante ao menos um paciente (migra dados antigos se houver)
loadProfile(); // restaura o paciente ativo antes do primeiro render
render();
</script>
